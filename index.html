<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=REDIRECT_URL">
    <title>Loading...</title>
</head>
<body>
    <p>Redirecting...</p>
    <script>
        var params = new URLSearchParams(window.location.search);
        var url = params.get('to');
        if (url) {
            window.location.href = decodeURIComponent(url);
        }
    </script>
</body>
</html>
